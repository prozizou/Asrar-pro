<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ASRAR PRO - La Grande Bibliothèque</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        :root {
            --bg-parchemin: #1a1a2e; 
            --grimoire-couv: #3a1c0b; 
            --or-vieux: #d9a06f; 
            --texte-ancien: #f1e4c3; 
            --border-grimoire: 2px solid #5d3a1a;
        }

        body {
            background-color: var(--bg-parchemin);
            color: var(--texte-ancien);
            font-family: 'Garamond', serif;
            margin: 0;
            padding: 20px;
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-grimoire);
            padding-bottom: 15px;
        }

        .back-btn {
            background: var(--grimoire-couv);
            border: var(--border-grimoire);
            color: var(--or-vieux);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .grimoire-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 25px;
        }

        .grimoire-card {
            background: var(--grimoire-couv);
            border-radius: 8px 15px 15px 8px;
            overflow: hidden;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: var(--border-grimoire);
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            position: relative;
        }

        .grimoire-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 12px; height: 100%;
            background: rgba(0,0,0,0.3);
            border-right: 1px solid rgba(217, 160, 111, 0.1);
            z-index: 1;
        }

        .grimoire-card:hover {
            transform: scale(1.05) rotate(-1deg);
            border-color: var(--or-vieux);
        }

        .grimoire-cover {
            width: 100%;
            height: 180px;
            object-fit: cover;
            opacity: 0.8;
        }

        .grimoire-info {
            padding: 12px;
            text-align: center;
            background: rgba(0,0,0,0.2);
        }

        .grimoire-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--or-vieux);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .page-badge {
            font-size: 0.65rem;
            color: var(--texte-ancien);
            opacity: 0.7;
            font-style: italic;
        }

        /* LECTEUR PDF */
        .modal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.95); z-index: 1000; 
            flex-direction: column; 
        }
        
        .modal-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--grimoire-couv);
            color: var(--or-vieux);
            border-bottom: var(--border-grimoire);
        }
        
        iframe { width: 100%; height: 100%; border: none; background: white; }
    </style>
</head>

    </div>

    <div class="grimoire-grid" id="grimoire-list">
        </div>

        </div>
        <iframe id="pdf-viewer" src=""></iframe>
    </div>
