<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ASRAR PRO - Bibliothèque</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #0f172a; --cuir: #3a1c0b; --or: #d9a06f; --texte: #f1e4c3;
        }

        body {
            background-color: var(--bg); color: var(--texte);
            font-family: 'Garamond', serif; margin: 0; padding: 20px;
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
        }

        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; border-bottom: 2px solid #5d3a1a; padding-bottom: 10px; }
        .back-btn { background: var(--cuir); border: 1px solid #5d3a1a; color: var(--or); padding: 8px 12px; border-radius: 8px; cursor: pointer; }

        .grimoire-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
        }

        .grimoire-card {
            background: var(--cuir); border-radius: 5px 15px 15px 5px;
            overflow: hidden; border: 1px solid #5d3a1a;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            position: relative; display: flex; flex-direction: column;
        }

        .grimoire-cover { width: 100%; height: 160px; object-fit: cover; opacity: 0.9; cursor: pointer; }

        .grimoire-info { padding: 10px; text-align: center; background: rgba(0,0,0,0.3); flex-grow: 1; }

        .grimoire-title { 
            font-size: 0.75rem; font-weight: 700; color: var(--or); 
            text-transform: uppercase; margin-bottom: 10px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        /* Boutons d'action */
        .actions { display: flex; flex-direction: column; gap: 5px; }
        
        .btn-view { 
            background: rgba(217, 160, 111, 0.1); border: 1px solid var(--or); 
            color: var(--or); font-size: 0.65rem; padding: 5px; border-radius: 4px; 
            cursor: pointer; text-decoration: none;
        }
        
        .btn-full { 
            background: var(--or); border: none; color: #000; 
            font-size: 0.65rem; padding: 5px; border-radius: 4px; 
            cursor: pointer; font-weight: bold;
        }

        /* Lecteur PDF */
        .modal { 
            display: none; position: fixed; inset: 0; 
            background: #000; z-index: 1000; flex-direction: column; 
        }
        
        .modal-header {
            padding: 10px; display: flex; justify-content: space-between;
            align-items: center; background: var(--cuir); color: var(--or);
        }
        
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">📜</button>
        <h1 style="margin:0; font-size:1rem;">ASRAR BIBLIO</h1>
    </div>

    <div class="grimoire-grid" id="grimoire-list"></div>

    <div id="reader" class="modal">
        <div class="modal-header">
            <span id="v-title" style="font-size: 0.7rem;">...</span>
            <button onclick="closeReader()" style="background:none; border:none; color:white; font-size:1.2rem;">✕</button>
        </div>
        <iframe id="pdf-viewer" src=""></iframe>
    </div>

    <script>
        const config = { databaseURL: "https://asrar-bc059.firebaseio.com" };
        firebase.initializeApp(config);
        const db = firebase.database();

        function loadBooks() {
            db.ref('almaqtab').on('value', snap => {
                const data = snap.val();
                if(!data) return;
                
                const items = Object.keys(data).map(k => ({...data[k], key: k}));
                
                document.getElementById('grimoire-list').innerHTML = items.map(grim => `
                    <div class="grimoire-card">
                        <img src="${grim.img}" class="grimoire-cover" onclick="openPreview('${grim.pdf}', '${grim.text}')">
                        <div class="grimoire-info">
                            <div class="grimoire-title">${grim.text ? grim.text.replace('.pdf', '') : 'Grimoire'}</div>
                            <div class="actions">
                                <button class="btn-view" onclick="openPreview('${grim.pdf}', '${grim.text}')">👁 Aperçu</button>
                                <button class="btn-full" onclick="openFull('${grim.pdf}')">🚀 Plein Écran</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            });
        }

        // Option 1 : Aperçu rapide (Iframe)
        function openPreview(url, title) {
            if(!url) return;
            document.getElementById('reader').style.display = 'flex';
            document.getElementById('v-title').innerText = title;
            document.getElementById('pdf-viewer').src = url.replace('/view', '/preview');
        }

        // Option 2 : Plein écran (Ouverture propre via Google Drive)
        function openFull(url) {
            if(!url) return;
            const fullUrl = url.replace('/preview', '/view').replace('/edit', '/view');
            window.open(fullUrl, '_blank');
        }

        function closeReader() {
            document.getElementById('reader').style.display = 'none';
            document.getElementById('pdf-viewer').src = "";
        }

        window.onload = loadBooks;
    </script>
</body>
</html>
