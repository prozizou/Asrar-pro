<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ASRAR PRO - Bibliothèque</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #0a0e17; 
            --card-bg: #161b2a; 
            --text: #e0e6ed; 
            --accent: #00bcd4;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 15px;
            min-height: 100vh;
        }

        /* En-tête Moderne */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #232d42;
        }

        .back-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }

        h2 {
            font-size: 1rem;
            letter-spacing: 1.5px;
            margin: 0;
            text-transform: uppercase;
        }

        /* Grille de livres */
        .grid-biblio {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .book-card {
            background: var(--card-bg);
            border: 1px solid #232d42;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .book-card:active {
            transform: scale(0.97);
        }

        .book-img {
            width: 100%;
            height: 150px;
            background: #000;
            object-fit: cover;
        }

        .book-info {
            padding: 12px;
        }

        .book-title {
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 12px;
            height: 34px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .btn-read {
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-read:active {
            background: var(--accent);
            color: #000;
        }

        /* Lecteur PDF plein écran */
        #pdf-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            flex-direction: column;
        }

        .modal-tools {
            padding: 15px;
            background: #161b2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        iframe {
            flex: 1;
            border: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="location.href='index.html'">← Retour</button>
        <h2>Bibliothèque</h2>
        <div style="width:70px;"></div>
    </div>

    <div class="grid-biblio" id="book-container">
        </div>

    <div id="pdf-modal">
        <div class="modal-tools">
            <span id="current-book-title" style="font-size:0.8rem; font-weight:bold;">Lecture</span>
            <button onclick="closePDF()" style="background:#ff4444; color:#fff; border:none; padding:5px 12px; border-radius:5px; font-weight:bold;">Quitter</button>
        </div>
        <iframe id="pdf-frame"></iframe>
    </div>

    <script>
        // --- LOGIQUE JAVASCRIPT UNIFIÉE ---

        // Configuration Firebase (Assurez-vous que l'URL est correcte)
        const firebaseConfig = {
            databaseURL: "https://asrar-bc059.firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Fonction pour charger les livres depuis Firebase
        function loadAlmaqtab() {
            const container = document.getElementById('book-container');
            
            database.ref('almaqtab').on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    container.innerHTML = "<p style='text-align:center; grid-column:span 2;'>Aucun livre trouvé.</p>";
                    return;
                }

                const keys = Object.keys(data);
                container.innerHTML = keys.map(key => {
                    const book = data[key];
                    // On enlève crossorigin pour éviter les erreurs d'affichage
                    return `
                        <div class="book-card">
                            <img src="${book.img}" class="book-img" alt="Couverture">
                            <div class="book-info">
                                <div class="book-title">${book.text ? book.text.replace('.pdf', '') : 'Livre Sans Titre'}</div>
                                <button class="btn-read" onclick="openPDF('${book.pdf}', '${book.text}')">LIRE LE PDF</button>
                            </div>
                        </div>
                    `;
                }).join('');
            });
        }

        // Fonction pour ouvrir le PDF
        function openPDF(url, title) {
            const modal = document.getElementById('pdf-modal');
            const frame = document.getElementById('pdf-frame');
            const titleSpan = document.getElementById('current-book-title');

            titleSpan.innerText = title ? title.replace('.pdf', '') : "Lecture";
            modal.style.display = 'flex';
            
            // Conversion du lien Google Drive pour l'affichage direct
            const previewUrl = url.replace('/view', '/preview');
            frame.src = previewUrl;
        }

        // Fonction pour fermer le PDF
        function closePDF() {
            const modal = document.getElementById('pdf-modal');
            const frame = document.getElementById('pdf-frame');
            modal.style.display = 'none';
            frame.src = ""; // Stop le chargement
        }

        // Lancement au chargement de la page
        window.onload = loadAlmaqtab;
    </script>
</body>
</html>
