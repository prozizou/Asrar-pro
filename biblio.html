<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ASRAR PRO - La Grande Bibliothèque</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-parchemin: #1a1a2e; 
            --grimoire-couv: #3a1c0b; 
            --or-vieux: #d9a06f; 
            --texte-ancien: #f1e4c3; 
            --shadow-mystic: 0 10px 30px rgba(0,0,0,0.6);
            --border-grimoire: 2px solid #5d3a1a;
        }

        body {
            background-color: var(--bg-parchemin);
            color: var(--texte-ancien);
            font-family: 'Garamond', serif;
            margin: 0;
            padding: 20px;
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 35px;
            border-bottom: 2px solid var(--border-grimoire);
            padding-bottom: 15px;
            position: relative;
        }

        .back-btn {
            background: var(--grimoire-couv);
            border: var(--border-grimoire);
            color: var(--or-vieux);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        h1 {
            font-size: 1.3rem;
            margin: 0;
            letter-spacing: 2px;
            color: var(--or-vieux);
            text-transform: uppercase;
            font-weight: 900;
        }

        .grimoire-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 25px;
        }

        .grimoire-card {
            background: var(--grimoire-couv);
            border-radius: 8px 15px 15px 8px;
            overflow: hidden;
            transition: 0.4s;
            border: var(--border-grimoire);
            cursor: pointer;
            box-shadow: var(--shadow-mystic);
            position: relative;
        }

        /* Effet dos de livre */
        .grimoire-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 12px;
            height: 100%;
            background: rgba(0,0,0,0.3);
            border-right: 1px solid rgba(217, 160, 111, 0.1);
            z-index: 1;
        }

        .grimoire-card:hover {
            transform: scale(1.05) rotate(-1deg);
            border-color: var(--or-vieux);
        }

        .grimoire-cover {
            width: 100%;
            height: 180px;
            object-fit: cover;
            opacity: 0.8;
        }

        .grimoire-info {
            padding: 12px;
            text-align: center;
            background: rgba(0,0,0,0.2);
        }

        .grimoire-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--or-vieux);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .grimoire-pt {
            font-size: 0.7rem;
            opacity: 0.6;
            font-style: italic;
        }

        /* LECTEUR PDF */
        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.95); 
            z-index: 1000; 
            flex-direction: column; 
        }
        
        .modal-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--grimoire-couv);
            color: var(--or-vieux);
        }
        
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">📜</button>
        <h1>LA GRANDE BIBLIOTHÈQUE</h1>
    </div>

    <div class="grimoire-grid" id="grimoire-list">
        </div>

    <div id="reader" class="modal">
        <div class="modal-header">
            <span id="view-title">Lecture</span>
            <button onclick="closeReader()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">✕</button>
        </div>
        <iframe id="pdf-viewer" src=""></iframe>
    </div>

    <script>
        const config = { databaseURL: "https://asrar-bc059.firebaseio.com" };
        firebase.initializeApp(config);
        const db = firebase.database();

        function loadBooks() {
            // Lecture de la branche almaqtab
            db.ref('almaqtab').on('value', snap => {
                const data = snap.val();
                if(!data) return;
                
                const items = Object.keys(data).map(k => ({...data[k], key: k}));
                
                document.getElementById('grimoire-list').innerHTML = items.map(grim => `
                    <div class="grimoire-card" onclick="openGrimoire('${grim.pdf}', '${grim.text}')">
                        <img src="${grim.img}" class="grimoire-cover" onerror="this.src='https://via.placeholder.com/150x200?text=Grimoire'">
                        <div class="grimoire-info">
                            <div class="grimoire-title">${grim.text.replace('.pdf', '')}</div>
                            <div class="grimoire-pt">Page/Ref: ${grim.pt || 'N/A'}</div>
                        </div>
                    </div>
                `).join('');
            });
        }

        function openGrimoire(url, title) {
            if(!url) return alert("Lien absent.");
            
            // Correction pour Google Drive
            let finalUrl = url;
            if(url.includes('drive.google.com')) {
                finalUrl = url.replace('/view', '/preview').replace('/edit', '/preview');
            }

            document.getElementById('view-title').innerText = title;
            document.getElementById('pdf-viewer').src = finalUrl;
            document.getElementById('reader').style.display = 'flex';
        }

        function closeReader() {
            document.getElementById('reader').style.display = 'none';
            document.getElementById('pdf-viewer').src = "";
        }

        window.onload = loadBooks;
    </script>
</body>
</html>
