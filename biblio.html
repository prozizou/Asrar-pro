<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ASRAR PRO - Bibliothèque</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #0f172a; --cuir: #3a1c0b; --or: #d9a06f; --texte: #f1e4c3;
        }

        body {
            background-color: var(--bg); color: var(--texte);
            font-family: 'Garamond', serif; margin: 0; padding: 20px;
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
        }

        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; border-bottom: 2px solid #5d3a1a; padding-bottom: 10px; }
        .back-btn { background: var(--cuir); border: 1px solid #5d3a1a; color: var(--or); padding: 8px 12px; border-radius: 8px; cursor: pointer; }

        .grimoire-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 20px;
        }

        .grimoire-card {
            background: var(--cuir); border-radius: 5px 15px 15px 5px;
            overflow: hidden; border: 1px solid #5d3a1a;
            cursor: pointer; transition: 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            position: relative;
        }

        .grimoire-card:active { transform: scale(0.95); }

        .grimoire-cover { width: 100%; height: 170px; object-fit: cover; opacity: 0.9; }

        .grimoire-info { padding: 10px; text-align: center; background: rgba(0,0,0,0.3); }

        .grimoire-title { 
            font-size: 0.75rem; font-weight: 700; color: var(--or); 
            text-transform: uppercase; line-height: 1.2;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        .page-badge { font-size: 0.6rem; opacity: 0.7; margin-top: 4px; }

        /* Lecteur PDF */
        .modal { 
            display: none; position: fixed; inset: 0; 
            background: #000; z-index: 1000; flex-direction: column; 
        }
        
        .modal-header {
            padding: 10px; display: flex; justify-content: space-between;
            align-items: center; background: var(--cuir); color: var(--or);
        }
        
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Animation de chargement */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--or); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 5px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">📜</button>
        <h1 style="margin:0; font-size:1rem;">BIBLIOTHÈQUE</h1>
    </div>

    <div class="grimoire-grid" id="grimoire-list">
        </div>

    <div id="reader" class="modal">
        <div class="modal-header">
            <span id="v-title" style="font-size: 0.8rem;">Lecture...</span>
            <button onclick="closeReader()" style="background:none; border:none; color:white; font-size:1.2rem;">✕</button>
        </div>
        <div id="loading-msg" style="text-align:center; padding: 20px; color: var(--or);"><div class="loader"></div> Ouverture du grimoire...</div>
        <iframe id="pdf-viewer" src="" onload="document.getElementById('loading-msg').style.display='none'"></iframe>
    </div>

    <script>
        // Configuration simple
        const config = { databaseURL: "https://asrar-bc059.firebaseio.com" };
        firebase.initializeApp(config);
        const db = firebase.database();

        function loadBooks() {
            db.ref('almaqtab').on('value', snap => {
                const data = snap.val();
                if(!data) return;
                
                const items = Object.keys(data).map(k => ({...data[k], key: k}));
                
                document.getElementById('grimoire-list').innerHTML = items.map(grim => `
                    <div class="grimoire-card" onclick="openGrimoire('${grim.pdf}', '${grim.text.replace(/'/g, "\\'")}')">
                        <img src="${grim.img}" class="grimoire-cover" loading="lazy">
                        <div class="grimoire-info">
                            <div class="grimoire-title">${grim.text ? grim.text.replace('.pdf', '') : 'Grimoire'}</div>
                            <div class="page-badge">📖 Consulter</div>
                        </div>
                    </div>
                `).join('');
            });
        }

        function openGrimoire(url, title) {
            if(!url) return alert("Lien introuvable.");
            
            document.getElementById('reader').style.display = 'flex';
            document.getElementById('loading-msg').style.display = 'block';
            document.getElementById('v-title').innerText = title;
            
            // Transformation du lien Drive
            let finalUrl = url.replace('/view', '/preview').replace('/edit', '/preview');
            document.getElementById('pdf-viewer').src = finalUrl;
        }

        function closeReader() {
            document.getElementById('reader').style.display = 'none';
            document.getElementById('pdf-viewer').src = "";
        }

        window.onload = loadBooks;
    </script>
</body>
</html>
