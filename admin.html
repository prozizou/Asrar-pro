<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin ASRAR PRO - Ajout Rapide</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #0a0e17; --card: #161b2a; --accent: #00bcd4; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .admin-card {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #232d42;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        h2 { font-size: 1.3rem; margin-bottom: 25px; color: var(--accent); text-align: center; letter-spacing: 1px; }

        .field { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; color: #8899a6; margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        
        input {
            width: 100%;
            padding: 14px;
            background: #0d1117;
            border: 1px solid #232d42;
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
            font-size: 0.9rem;
        }

        input:focus { border-color: var(--accent); outline: none; }

        .btn-send {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .btn-send:disabled { background: #232d42; color: #555; cursor: not-allowed; }

        #status { font-size: 0.8rem; text-align: center; margin-top: 20px; font-weight: 500; min-height: 20px; }
        .success { color: #4caf50; }
        .error { color: #f44336; }
        .loading { color: #ff9800; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h2>AJOUTER AU HUB</h2>
        
        <div class="field">
            <label>Nom de la section</label>
            <input type="text" id="title" placeholder="Ex: Bibliothèque">
        </div>

        <div class="field">
            <label>Image (Galerie/Photo)</label>
            <input type="file" id="image" accept="image/*">
        </div>

        <button class="btn-send" id="btn" onclick="processUpload()">PUBLIER SUR ASRAR PRO</button>
        
        <div id="status">En attente...</div>
    </div>

    <script>
        // Ta config Firebase Realtime Database
        const firebaseConfig = {
            databaseURL: "https://asrar-bc059.firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const IMGBB_KEY = "d2dbb177b2f00ed6df8008b668246a84";

        async function processUpload() {
            const titleInput = document.getElementById('title');
            const fileInput = document.getElementById('image');
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');

            if (!titleInput.value || !fileInput.files[0]) {
                alert("Veuillez remplir tous les champs.");
                return;
            }

            btn.disabled = true;
            status.innerHTML = '<span class="loading">⏳ Hébergement de l\'image...</span>';

            try {
                // 1. Envoi vers ImgBB
                const formData = new FormData();
                formData.append("image", fileInput.files[0]);

                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                    method: "POST",
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    const finalUrl = result.data.url;
                    status.innerHTML = '<span class="loading">🔄 Liaison avec Firebase...</span>';

                    // 2. Enregistrement dans menu_AsrarPro
                    await db.ref('menu_AsrarPro').push({
                        titre: titleInput.value,
                        image: finalUrl
                    });

                    status.innerHTML = '<span class="success">✅ PUBLIÉ AVEC SUCCÈS !</span>';
                    titleInput.value = "";
                    fileInput.value = "";
                } else {
                    throw new Error("Erreur serveur ImgBB");
                }

            } catch (err) {
                console.error(err);
                status.innerHTML = `<span class="error">❌ Erreur : ${err.message}</span>`;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
