<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard ASRAR PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #0a0e17; --card: #161b2a; --accent: #00bcd4; --danger: #ff4444; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        
        .admin-container { width: 100%; max-width: 450px; }
        
        /* Formulaire d'ajout */
        .admin-card {
            background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #232d42;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 30px;
        }

        h2 { font-size: 1.1rem; margin-bottom: 20px; color: var(--accent); text-align: center; text-transform: uppercase; }

        input {
            width: 100%; padding: 12px; background: #0d1117; border: 1px solid #232d42;
            border-radius: 10px; color: white; margin-bottom: 15px; box-sizing: border-box;
        }

        .btn-send {
            width: 100%; background: var(--accent); color: #000; border: none;
            padding: 14px; border-radius: 10px; font-weight: 900; cursor: pointer;
        }

        /* Liste de gestion */
        .manage-list { width: 100%; }
        .item-row {
            background: var(--card); padding: 12px; border-radius: 12px; border: 1px solid #232d42;
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
        }
        .item-row img { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; margin-right: 12px; }
        .item-info { flex: 1; font-size: 0.85rem; font-weight: 600; }
        
        .btn-delete {
            background: rgba(255, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger);
            padding: 5px 10px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; font-weight: bold;
        }
        .btn-delete:hover { background: var(--danger); color: white; }

        #status { font-size: 0.75rem; text-align: center; margin-top: 15px; color: var(--accent); }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="admin-card">
            <h2>Ajouter au Hub</h2>
            <input type="text" id="title" placeholder="Titre de la section">
            <input type="file" id="image" accept="image/*">
            <button class="btn-send" id="btn" onclick="processUpload()">PUBLIER</button>
            <div id="status">Prêt</div>
        </div>

        <h2 style="color: #8899a6; font-size: 0.8rem;">Gérer les éléments actuels</h2>
        <div class="manage-list" id="manage-list">
            <p style="text-align:center; opacity:0.5; font-size:0.8rem;">Chargement du menu...</p>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://asrar-bc059.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const IMGBB_KEY = "d2dbb177b2f00ed6df8008b668246a84";

        // --- CHARGEMENT ET AFFICHAGE DE LA LISTE ---
        function loadItems() {
            const listDiv = document.getElementById('manage-list');
            db.ref('menu_AsrarPro').on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    listDiv.innerHTML = "<p style='text-align:center; opacity:0.5; font-size:0.8rem;'>Aucun élément trouvé.</p>";
                    return;
                }

                listDiv.innerHTML = Object.keys(data).map(key => `
                    <div class="item-row">
                        <img src="${data[key].image}" alt="">
                        <div class="item-info">${data[key].titre}</div>
                        <button class="btn-delete" onclick="deleteItem('${key}')">SUPPRIMER</button>
                    </div>
                `).join('');
            });
        }

        // --- FONCTION DE SUPPRESSION ---
        function deleteItem(key) {
            if (confirm("Voulez-vous vraiment supprimer cette section ?")) {
                db.ref('menu_AsrarPro/' + key).remove()
                    .then(() => alert("Élément supprimé !"))
                    .catch((err) => alert("Erreur: " + err.message));
            }
        }

        // --- FONCTION D'AJOUT (ImgBB) ---
        async function processUpload() {
            const titleInput = document.getElementById('title');
            const fileInput = document.getElementById('image');
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');

            if (!titleInput.value || !fileInput.files[0]) {
                alert("Remplissez tout !");
                return;
            }

            btn.disabled = true;
            status.innerText = "⏳ Hébergement de l'image...";

            try {
                const formData = new FormData();
                formData.append("image", fileInput.files[0]);
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                    method: "POST",
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    status.innerText = "🔄 Mise à jour Firebase...";
                    await db.ref('menu_AsrarPro').push({
                        titre: titleInput.value,
                        image: result.data.url
                    });
                    status.innerText = "✅ Succès !";
                    titleInput.value = "";
                    fileInput.value = "";
                }
            } catch (err) {
                status.innerText = "❌ Erreur";
                console.error(err);
            } finally {
                btn.disabled = false;
            }
        }

        window.onload = loadItems;
    </script>
</body>
</html>
