<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ASRAR PRO - Secrets</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8198863698846619" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg: #0a0e17; 
            --card-bg: #161b2a; 
            --text: #e0e6ed; 
            --accent: #00bcd4;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* En-tête Moderne */
        .header {
            width: 100%;
            max-width: 500px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            border-bottom: 1px solid #232d42;
            padding-bottom: 15px;
        }

        .back-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-btn:active {
            background: var(--accent);
            color: #000;
        }

        /* Contenu de la page */
        .content-pro {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: 15px;
            border: 1px solid #232d42;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .icon-main {
            font-size: 3.5rem;
            margin-bottom: 20px;
            display: block;
        }

        h2 {
            color: #fff;
            margin-top: 0;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
        }

        .desc-text {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #8899a6;
            margin-bottom: 30px;
        }

        /* Liste des enseignements */
        .item-secret {
            background: rgba(255,255,255,0.02);
            border: 1px solid #232d42;
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 12px;
            text-align: left;
            transition: 0.3s ease;
            cursor: pointer;
        }

        .item-secret:active {
            border-color: var(--accent);
            transform: scale(0.98);
        }

        .item-tag {
            color: var(--accent);
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .item-title {
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* Zone Publicitaire */
        .ad-footer {
            margin-top: auto;
            width: 100%;
            max-width: 500px;
            padding: 20px 0;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="goHome()">← Hub</button>
        <span style="font-weight:800; letter-spacing:1px; text-transform: uppercase;">Section Asrar</span>
        <div style="width:60px;"></div>
    </div>

    <div class="content-pro">
        <span class="icon-main">💠</span>
        <h2>Enseignements Secrets</h2>
        <p class="desc-text">Accédez aux connaissances ésotériques et aux rituels avancés d'ASRAR PRO.</p>
        
        <div id="secrets-list">
            </div>
    </div>

    <div class="ad-footer">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-8198863698846619"
             data-ad-slot="votre-slot-id"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script>
        // --- LOGIQUE JAVASCRIPT UNIFIÉE ---

        // Données des secrets (Peut être déplacé vers Firebase plus tard)
        const secretsData = [
            { id: "01", label: "Connaissance", title: "Introduction aux secrets du Khawatim" },
            { id: "02", label: "Mystique", title: "Les influences des carrés magiques" },
            { id: "03", label: "Pratique", title: "Rituels de protection avancés" }
        ];

        function displaySecrets() {
            const container = document.getElementById('secrets-list');
            container.innerHTML = secretsData.map(item => `
                <div class="item-secret" onclick="showDetail('${item.title}')">
                    <div class="item-tag">Secret ${item.id} — ${item.label}</div>
                    <div class="item-title">${item.title}</div>
                </div>
            `).join('');
        }

        function showDetail(title) {
            // Vibration légère pour le feedback mobile
            if (navigator.vibrate) navigator.vibrate(10);
            alert("Accès restreint : " + title);
        }

        function goHome() {
            window.location.href = 'index.html';
        }

        // Lancement au chargement
        window.onload = displaySecrets;
    </script>
</body>
</html>
