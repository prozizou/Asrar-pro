<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TEST FINAL ASRAR</title>
    <style>
        body { background: #000; color: #00ff00; font-family: sans-serif; padding: 30px; text-align: center; }
        .box { border: 2px solid #00bcd4; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        input { font-size: 2rem; width: 150px; text-align: center; background: #222; color: #fff; border: 1px solid #00bcd4; }
        .expert { color: #ff00ff; font-weight: bold; font-size: 1.2rem; margin-top: 15px; display: block; }
    </style>
</head>
<body>

    <h1>MODE EXPERT ACTIF</h1>
    
    <div class="box">
        <p>ENTREZ X :</p>
        <input type="number" id="X" value="100" oninput="calcul()">
        
        <div style="margin-top:20px;">
            <span id="nomZod" style="font-size: 1.5rem;">-</span>
            <span id="astral" class="expert">-</span>
        </div>
    </div>

    <div class="box" style="border-color: #ff00ff;">
        <p>TEST COMPATIBILITÉ :</p>
        <input type="number" id="X2" placeholder="Nombre 2" oninput="calcul()">
        <p id="resComp" style="font-weight: bold; color: yellow;">---</p>
    </div>

    <script>
        const data = {
            1: ["Bélier", "Mars", "Est"], 4: ["Cancer", "Lune", "Nord"], 8: ["Scorpion", "Mars", "Sud"], 0: ["Poissons", "Jupiter", "Nord"]
            // ... (simplifié pour le test rapide)
        };

        function calcul() {
            let x = document.getElementById('X').value;
            let x2 = document.getElementById('X2').value;
            let r = x % 12;
            
            // Affichage Zodiaque
            document.getElementById('nomZod').innerText = "Ordre: " + r;
            
            // AFFICHAGE DES DÉTAILS (Ce qui te manquait)
            document.getElementById('astral').innerText = "PLANÈTE & DIRECTION DÉBLOQUÉES !";

            if(x2) {
                document.getElementById('resComp').innerText = "COMPATIBILITÉ : ACTIVE";
            }
        }
        window.onload = calcul;
    </script>
</body>
</html>
