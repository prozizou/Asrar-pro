<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ASRAR PRO - Accueil</title>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8198863698846619" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg: #0f172a; 
            --cuir: #3a1c0b; 
            --or: #d9a06f; 
            --texte: #f1e4c3;
            --bordure: 1px solid #5d3a1a;
        }

        body {
            background-color: var(--bg);
            color: var(--texte);
            font-family: 'Segoe UI', serif;
            margin: 0;
            padding: 20px;
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
            text-align: center;
        }

        .logo-container {
            margin: 30px 0;
        }

        .logo-main {
            width: 120px;
            filter: drop-shadow(0 0 10px var(--or));
        }

        h1 {
            color: var(--or);
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 40px;
        }

        /* Grille de Navigation */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        .menu-item {
            background: var(--cuir);
            border: var(--bordure);
            padding: 25px 15px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .menu-item:active {
            transform: scale(0.95);
        }

        .icon-circle {
            width: 50px;
            height: 50px;
            background: rgba(217, 160, 111, 0.1);
            border: 1px solid var(--or);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .label {
            font-weight: bold;
            font-size: 0.85rem;
            color: var(--or);
            text-transform: uppercase;
        }

        /* Zone Pub */
        .ad-banner {
            margin-top: 50px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            min-height: 100px;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://cdn-icons-png.flaticon.com/512/3342/3342137.png" class="logo-main" alt="Logo">
        <h1>ASRAR PRO</h1>
        <div class="subtitle">L'Art des Grimoires Sacrés</div>
    </div>

    <div class="menu-grid">
        <div class="menu-item" onclick="navigateTo('biblio.html')">
            <div class="icon-circle">📚</div>
            <div class="label">Bibliothèque</div>
        </div>

        <div class="menu-item" onclick="navigateTo('Market.html')">
            <div class="icon-circle">🛒</div>
            <div class="label">Marché</div>
        </div>

        <div class="menu-item" onclick="navigateTo('biblio.html?filter=fav')">
            <div class="icon-circle">⭐</div>
            <div class="label">Favoris</div>
        </div>

        <div class="menu-item" onclick="alert('Bientôt disponible !')">
            <div class="icon-circle">👤</div>
            <div class="label">Profil</div>
        </div>
    </div>

    <div class="ad-banner">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-8198863698846619"
             data-ad-slot="votre-slot-id"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <script>
        function navigateTo(page) {
            // Effet sonore ou vibration (optionnel)
            if (window.navigator.vibrate) {
                window.navigator.vibrate(20);
            }
            
            // Redirection vers la page demandée
            window.location.href = page;
        }

        // Initialisation AdSense une fois le DOM chargé
        document.addEventListener('DOMContentLoaded', () => {
            console.log("ASRAR PRO prêt - Status Publicitaire: Autorisé");
        });
    </script>
</body>
</html>
