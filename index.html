<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASRAR PRO V2 - Accueil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header><h1>ASRAR PRO V2</h1></header>
        <div class="menu-grid" id="menuGrid"></div>
    </div>

    <script>
        async function loadMenu() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                const grid = document.getElementById('menuGrid');
                
                Object.keys(data).forEach(cat => {
                    const item = document.createElement('div');
                    item.className = 'menu-item';
                    item.innerHTML = `<p>${cat.toUpperCase()}</p>`;
                    // Redirige vers asrar.html avec le nom de la catégorie
                    item.onclick = () => window.location.href = `asrar.html?cat=${cat}`;
                    grid.appendChild(item);
                });
            } catch (e) { console.error("Erreur data.json", e); }
        }
        window.onload = loadMenu;
    </script>
</body>
</html>
