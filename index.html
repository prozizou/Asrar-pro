<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanzou - Accueil</title>
    <style>
        /* STYLE CSS INTÉGRÉ */
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 { margin-bottom: 30px; font-weight: 800; letter-spacing: -1px; }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 400px;
        }

        /* La carte de base */
        .menu-item {
            background: var(--card);
            padding: 20px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
            cursor: default; /* Par défaut, pas de curseur de lien */
        }

        /* Style spécifique pour le bouton cliquable Asrar */
        .clickable-asrar {
            cursor: pointer;
            border: 1px solid var(--accent);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.1);
        }

        .clickable-asrar:active {
            transform: scale(0.95);
            background: rgba(56, 189, 248, 0.1);
        }

        .icon { font-size: 2rem; margin-bottom: 10px; display: block; }
        .label { font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .disabled { opacity: 0.5; filter: grayscale(1); }
    </style>
</head>
<body>

    <h1>KANZOU</h1>

    <div class="menu-grid">
        <div class="menu-item clickable-asrar" onclick="goToAsrar()">
            <span class="icon">✨</span>
            <span class="label">Asrar</span>
        </div>

        <div class="menu-item disabled">
            <span class="icon">📚</span>
            <span class="label">Zikr</span>
        </div>

        <div class="menu-item disabled">
            <span class="icon">📅</span>
            <span class="label">Horaires</span>
        </div>

        <div class="menu-item disabled">
            <span class="icon">⚙️</span>
            <span class="label">Profil</span>
        </div>
    </div>

    <script>
        /* LOGIQUE JAVASCRIPT */
        function goToAsrar() {
            // Seule cette fonction déclenche la redirection
            window.location.href = 'asrar.html';
        }
    </script>
</body>
</html>
