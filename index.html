<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB - ASRAR PRO</title>
    <style>
        :root { 
            --bg: #0a0e17; --card: #161b2a; --accent: #00bcd4; --text: #ffffff; 
            --border: #232d42; --muted: #8899a6;
        }
        
        body { 
            background-color: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        h1 { font-size: 1.5rem; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin-bottom: 30px; }

        .grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; 
            width: 100%; max-width: 500px; 
        }

        .menu-card {
            background: var(--card); border: 1px solid var(--border);
            padding: 20px; border-radius: 20px; text-align: center;
            text-decoration: none; color: white; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .menu-card:active { transform: scale(0.95); background: var(--border); }

        .icon { font-size: 2rem; margin-bottom: 10px; }
        .title { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .desc { font-size: 0.6rem; color: var(--muted); margin-top: 5px; }

        /* Style spécial pour le bouton Expert */
        .expert-glow { border-color: #e91e63; box-shadow: 0 0 15px rgba(233, 30, 99, 0.2); }
    </style>
</head>
<body>

    <h1>ASRAR PRO</h1>

    <div class="grid">
        <a href="numerology_astral.html" class="menu-card expert-glow">
            <div class="icon">✨</div>
            <span class="title">Numérologie</span>
            <span class="desc">Astral & Expert</span>
        </a>

        <a href="biblio.html" class="menu-card">
            <div class="icon">📚</div>
            <span class="title">Bibliothèque</span>
            <span class="desc">Documents PDF</span>
        </a>

        <a href="releveur.html" class="menu-card">
            <div class="icon">📊</div>
            <span class="title">Gestion</span>
            <span class="desc">Compteurs & Suivi</span>
        </a>

        <a href="admin.html" class="menu-card">
            <div class="icon">⚙️</div>
            <span class="title">Admin</span>
            <span class="desc">Configuration</span>
        </a>
    </div>

    <footer style="margin-top: 50px; font-size: 0.5rem; color: var(--muted); letter-spacing: 2px;">
        SYSTÈME ASRAR PRO v3.0 - 2026
    </footer>

</body>
</html>
