<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ASRAR PRO - Hub Mystique</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8198863698846619" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg: #0a0e17; 
            --card-bg: #161b2a; 
            --text: #ffffff; 
            --accent: #00bcd4;
            --border: #232d42;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* En-tête */
        .header-main {
            text-align: center;
            margin: 40px 0 50px;
        }

        .main-title {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #fff 0%, #555 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .subtitle {
            font-size: 0.65rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 10px;
            font-weight: 600;
        }

        /* Grille Dynamique */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 480px;
        }

        .card-pro {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.3s;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .card-pro:active {
            transform: scale(0.96);
            border-color: var(--accent);
        }

        .img-wrapper {
            width: 100%;
            height: 115px;
            background: #000;
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
            border-top: 1px solid var(--border);
        }

        .card-title {
            font-size: 0.75rem;
            font-weight: 800;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #e0e6ed;
        }

        .btn-glow {
            color: var(--accent);
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* États */
        #loader {
            margin-top: 60px;
            color: var(--accent);
            font-size: 0.8rem;
            letter-spacing: 3px;
            font-weight: bold;
        }

        .empty-msg {
            grid-column: span 2;
            text-align: center;
            padding: 40px;
            opacity: 0.5;
            font-size: 0.9rem;
        }

        /* Publicité Footer */
        .ad-container {
            margin-top: auto;
            width: 100%;
            max-width: 500px;
            padding: 30px 0;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header-main">
        <h1 class="main-title">ASRAR PRO</h1>
        <div class="subtitle">Intelligence & Mystique</div>
    </div>

    <div id="loader">SYNCHRONISATION...</div>

    <div class="grid-container" id="hub-grid"></div>

    <div class="ad-container">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-8198863698846619"
             data-ad-slot="votre-slot-id"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script>
        // Configuration Firebase (Realtime Database)
        const firebaseConfig = {
            databaseURL: "https://asrar-bc059.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Chargement automatique du menu
        function initApp() {
            const grid = document.getElementById('hub-grid');
            const loader = document.getElementById('loader');
            
            // Écoute en temps réel du nœud menu_AsrarPro
            db.ref('menu_AsrarPro').on('value', (snapshot) => {
                const data = snapshot.val();
                loader.style.display = 'none'; // Cache le loader dès réception
                
                if (!data) {
                    grid.innerHTML = `
                        <div class="empty-msg">
                            <p>Le Hub est vide.</p>
                            <small>Utilisez admin.html pour ajouter des sections.</small>
                        </div>`;
                    return;
                }

                // Conversion de l'objet Firebase en tableau exploitable
                const items = Object.keys(data).map(key => ({
                    id: key,
                    ...data[key]
                }));

                // Génération de l'HTML pour chaque carte
                grid.innerHTML = items.map(item => `
                    <div class="card-pro" onclick="handleNavigation('${item.titre}')">
                        <div class="img-wrapper">
                            <img src="${item.image}" alt="${item.titre}">
                        </div>
                        <div class="card-info">
                            <h3 class="card-title">${item.titre}</h3>
                            <div class="btn-glow">›</div>
                        </div>
                    </div>
                `).join('');
            });
        }

        /**
         * LOGIQUE DE NAVIGATION INTELLIGENTE
         * Redirige vers la page HTML correspondante selon les mots-clés du titre.
         */
        function handleNavigation(titre) {
            const t = titre.toLowerCase();

            // 1. Redirection vers les Secrets (Anciennement asrar.html)
            if (t.includes("asrar") || t.includes("secret") || t.includes("mystique")) {
                window.location.href = 'secrets_mystique.html';
            } 
            // 2. Redirection vers la Bibliothèque
            else if (t.includes("biblio") || t.includes("livre") || t.includes("lecture")) {
                window.location.href = 'biblio.html';
            } 
            // 3. Redirection vers le Marché / Services
            else if (t.includes("marché") || t.includes("market") || t.includes("service") || t.includes("achat")) {
                window.location.href = 'Market.html';
            } 
            // 4. Redirection vers la Numérologie
            else if (t.includes("numéro") || t.includes("calcul") || t.includes("chiffre")) {
                window.location.href = 'numerologie.html';
            }
            // 5. Cas par défaut
            else {
                alert("La section '" + titre + "' est active, mais sa page de destination n'est pas encore liée.");
            }
        }

        // Lancement au chargement de la fenêtre
        window.onload = initApp;
    </script>
</body>
</html>
