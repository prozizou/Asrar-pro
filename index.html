<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASRAR PRO V2 - Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header><h1>ASRAR PRO V2</h1></header>
        <div class="menu-grid" id="menuGrid"></div>
    </div>

    <script>
        async function init() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                const grid = document.getElementById('menuGrid');
                
                Object.keys(data).forEach(key => {
                    const card = document.createElement('div');
                    card.className = 'menu-item';
                    card.innerHTML = `<p>${data[key].titre}</p>`;
                    // Envoie la clé Firebase (ex: db_sirr_protection) dans l'URL
                    card.onclick = () => window.location.href = `asrar.html?cat=${key}`;
                    grid.appendChild(card);
                });
            } catch (e) { console.error("Erreur chargement JSON", e); }
        }
        window.onload = init;
    </script>
</body>
</html>
