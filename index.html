<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ASRAR PRO - Hub Intelligent</title>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8198863698846619" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-dark: #0a0e17; /* Fond uni ultra sombre */
            --card-bg: #161b2a;
            --text-main: #ffffff;
            --text-muted: #8899a6;
            --accent-default: #00bcd4;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* En-tête Pro */
        .header-pro {
            text-align: center;
            margin: 40px 0 50px;
        }

        .main-title {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #fff 0%, #555 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .tagline {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* Grille Interactive */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            width: 100%;
            max-width: 480px;
        }

        .card-pro {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid #232d42;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card-pro:active {
            transform: scale(0.96);
        }

        /* Image avec fallback noir */
        .img-wrapper {
            width: 100%;
            height: 100px;
            background: #000;
            overflow: hidden;
            position: relative;
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .img-wrapper img.loaded {
            opacity: 1;
        }

        /* Texte & Bouton Luminescent */
        .card-info {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #232d42;
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
        }

        .btn-glow {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1.5px solid var(--glow-color, var(--accent-default));
            color: var(--glow-color, var(--accent-default));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            box-shadow: 0 0 12px var(--glow-alpha, rgba(0, 188, 212, 0.4));
            transition: all 0.3s ease;
        }

        /* Zone Publicitaire */
        .ad-section {
            margin-top: auto;
            width: 100%;
            max-width: 480px;
            padding: 25px 0;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header-pro">
        <h1 class="main-title">ASRAR PRO</h1>
        <div class="tagline">Technologie & Ézotérisme</div>
    </div>

    <div class="grid-container" id="hub-grid">
        </div>

    <div class="ad-section">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-8198863698846619"
             data-ad-slot="votre-slot-id"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script>
        // Vos données JSON exactes
        const data = {
          "asrar": [
            { "id": 1, "titre": "Asrar", "image": "https://i.ibb.co/mryjJvhR/40688297-mystique-alchimique-cercle-secret-la-magie-cercle-pour-breloques-vectoriel.jpg" },
            { "id": 2, "titre": "Bibliothèque", "image": "https://i.ibb.co/zWf4zhFR/pile-livres-colores-1308-171741.jpg" },
            { "id": 3, "titre": "Marché & Services", "image": "https://i.ibb.co/933WytbF/a-shop-logo-little-town-market-11042322-png-sw800.png" },
            { "id": 4, "titre": "Planètes", "image": "https://i.ibb.co/5XHS58hc/saatan-ornament.png" },
            { "id": 5, "titre": "Chiffres", "image": "https://i.ibb.co/nqwHmSPh/61y8x3rk-XAL-AC-UF1000-1000-QL80.jpg" },
            { "id": 6, "titre": "Abajad", "image": "https://i.ibb.co/G35RKtJ7/9b0701045eeefb2a23fc82c027b80636-fgraphic.png" },
            { "id": 7, "titre": "Applications", "image": "https://i.ibb.co/xSWbhgYZ/What-Google-is-telling-app-developers-to-do-will-make-the-Play-Store-look-better.png" },
            { "id": 8, "titre": "Consultation", "image": "https://i.ibb.co/Rkc7wGWj/symbole-medical-plat-23-2149496593.jpg" }
          ]
        };

        function initHub() {
            const grid = document.getElementById('hub-grid');
            grid.innerHTML = data.asrar.map(item => `
                <div class="card-pro" id="card-${item.id}" onclick="navigate('${item.titre}')">
                    <div class="img-wrapper">
                        <img src="${item.image}" id="img-${item.id}" crossorigin="anonymous" 
                             onload="processColor(this, '${item.id}')">
                    </div>
                    <div class="card-info">
                        <h3 class="card-title">${item.titre}</h3>
                        <div class="btn-glow" id="btn-${item.id}">→</div>
                    </div>
                </div>
            `).join('');
        }

        // --- SYSTÈME DE LUMINESCENCE ADAPTATIVE ---
        function processColor(img, id) {
            img.classList.add('loaded');
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 1; canvas.height = 1;
                ctx.drawImage(img, 0, 0, 1, 1);
                const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
                
                const color = `rgb(${r}, ${g}, ${b})`;
                const alphaColor = `rgba(${r}, ${g}, ${b}, 0.3)`;
                
                const card = document.getElementById(`card-${id}`);
                const btn = document.getElementById(`btn-${id}`);
                
                // Appliquer les styles dynamiques
                card.style.setProperty('--glow-color', color);
                card.style.setProperty('--glow-alpha', alphaColor);
                
                // Effet de bordure lumineuse sur la carte
                card.style.borderColor = `rgba(${r}, ${g}, ${b}, 0.5)`;
                card.addEventListener('mouseenter', () => {
                    card.style.boxShadow = `0 0 20px rgba(${r}, ${g}, ${b}, 0.4)`;
                });
                card.addEventListener('mouseleave', () => {
                    card.style.boxShadow = 'none';
                });
            } catch (e) {
                console.warn("Analyse de couleur bloquée par CORS pour l'ID: " + id);
            }
        }

        function navigate(titre) {
            if (navigator.vibrate) navigator.vibrate(10);
            
            if (titre === "Asrar") window.location.href = 'Asrar.html';
            else if (titre === "Marché & Services") window.location.href = 'Market.html';
            else if (titre === "Bibliothèque") window.location.href = 'biblio.html';
            else alert("La section " + titre + " est en cours de développement.");
        }

        window.onload = initHub;
    </script>
</body>
</html>
