<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ASRAR PRO - Hub Moderne</title>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8198863698846619" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-dark: #0a0e17; /* Fond ultra sombre, uni */
            --card-bg: #161b2a;
            --text-main: #e0e6ed;
            --text-muted: #8899a6;
            --accent-default: #00bcd4; /* Cyan par défaut */
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; /* Police Pro, clean */
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* En-tête Clean & Pro */
        .header-pro {
            text-align: center;
            margin: 30px 0 40px;
        }

        .main-title {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px; /* Style moderne resserré */
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .tagline-pro {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* Grille Moderne */
        .grid-pro {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 40px;
        }

        .card-pro {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid #2d3748;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card-pro:active { transform: scale(0.97); }

        /* Effet de lueur au survol/clic */
        .card-pro:hover {
            box-shadow: 0 0 15px var(--card-glow-color, rgba(0, 188, 212, 0.3));
            border-color: var(--card-glow-color, #00bcd4);
        }

        /* Conteneur d'image propre */
        .image-box-pro {
            width: 100%;
            height: 90px;
            background: #000;
            position: relative;
        }

        .image-box-pro img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s;
        }

        /* Texte Professionnel */
        .info-box-pro {
            padding: 12px;
            text-align: left;
            border-top: 1px solid #2d3748;
        }

        .label-pro {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            margin: 0;
        }

        /* Bouton avec Luminescence Adaptative */
        .btn-enter {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--card-glow-color, #00bcd4);
            color: var(--card-glow-color, #00bcd4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            position: absolute;
            bottom: 10px;
            right: 10px;
            box-shadow: 0 0 10px var(--card-glow-color, rgba(0, 188, 212, 0.5));
            transition: all 0.3s;
        }

        /* Zone Pub Pro */
        .ad-pro {
            width: 100%;
            max-width: 500px;
            margin-top: auto;
            text-align: center;
            border-top: 1px solid #2d3748;
            padding: 15px 0;
        }
    </style>
</head>
<body>

    <div class="header-pro">
        <h1 class="main-title">ASRAR PRO</h1>
        <div class="tagline-pro">Intelligence Mystique</div>
    </div>

    <div class="grid-pro" id="main-grid">
        </div>

    <div class="ad-pro">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-8198863698846619"
             data-ad-slot="votre-slot-id"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script>
        // Vos données JSON exactes
        const menuData = {
          "asrar": [
            { "id": 1, "titre": "Asrar", "image": "https://i.ibb.co/mryjJvhR/40688297-mystique-alchimique-cercle-secret-la-magie-cercle-pour-breloques-vectoriel.jpg" },
            { "id": 2, "titre": "Bibliothèque", "image": "https://i.ibb.co/zWf4zhFR/pile-livres-colores-1308-171741.jpg" },
            { "id": 3, "titre": "Marché & Services", "image": "https://i.ibb.co/933WytbF/a-shop-logo-little-town-market-11042322-png-sw800.png" },
            { "id": 4, "titre": "Planètes", "image": "https://i.ibb.co/5XHS58hc/saatan-ornament.png" },
            { "id": 5, "titre": "Chiffres", "image": "https://i.ibb.co/nqwHmSPh/61y8x3rk-XAL-AC-UF1000-1000-QL80.jpg" },
            { "id": 6, "titre": "Abajad", "image": "https://i.ibb.co/G35RKtJ7/9b0701045eeefb2a23fc82c027b80636-fgraphic.png" },
            { "id": 7, "titre": "Applications", "image": "https://i.ibb.co/xSWbhgYZ/What-Google-is-telling-app-developers-to-do-will-make-the-Play-Store-look-better.png" },
            { "id": 8, "titre": "Consultation", "image": "https://i.ibb.co/Rkc7wGWj/symbole-medical-plat-23-2149496593.jpg" }
          ]
        };

        function renderGrid() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = menuData.asrar.map((item, index) => `
                <div class="card-pro" id="card-${item.id}" onclick="handleNav('${item.titre}')">
                    <div class="image-box-pro">
                        <img src="${item.image}" id="img-${item.id}" alt="${item.titre}" loading="lazy" crossorigin="anonymous">
                    </div>
                    <div class="info-box-pro">
                        <h3 class="label-pro">${item.titre}</h3>
                    </div>
                    <div class="btn-enter" id="btn-${item.id}">→</div>
                </div>
            `).join('');
            
            // Une fois la grille dessinée, on calcule les couleurs
            calculateGlowColors();
        }

        // --- MAGIE DE LA LUMINESCENCE ADAPTATIVE ---
        function calculateGlowColors() {
            menuData.asrar.forEach(item => {
                const img = document.getElementById(`img-${item.id}`);
                const card = document.getElementById(`card-${item.id}`);
                const btn = document.getElementById(`btn-${item.id}`);

                // S'assure que l'image est chargée pour extraire la couleur
                if (img.complete) {
                    applyColor(img, card, btn);
                } else {
                    img.addEventListener('load', () => applyColor(img, card, btn));
                }
            });
        }

        function applyColor(img, card, btn) {
            try {
                // Création d'un canvas invisible pour analyser l'image
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 1; canvas.height = 1; // On réduit à 1 pixel pour avoir la moyenne
                ctx.drawImage(img, 0, 0, 1, 1);
                const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
                
                // On crée une couleur lumineuse (on booste la saturation)
                const glowColor = `rgba(${r}, ${g}, ${b}, 0.6)`;
                const borderColor = `rgb(${r}, ${g}, ${b})`;

                // Application des styles CSS variables dynamiques
                card.style.setProperty('--card-glow-color', borderColor);
                btn.style.borderColor = borderColor;
                btn.style.color = borderColor;
                btn.style.boxShadow = `0 0 10px ${glowColor}`;
            } catch (e) {
                console.log("Erreur d'extraction de couleur (CORS probable).");
            }
        }

        function handleNav(titre) {
            if (titre === "Marché & Services") window.location.href = 'Market.html';
            else if (titre === "Bibliothèque") window.location.href = 'biblio.html';
            else alert("La section " + titre + " est en cours d'activation.");
        }

        window.onload = renderGrid;
    </script>
</body>
</html>
