<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASRAR PRO - Accueil</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        h1 { font-size: 1.6rem; font-weight: 900; letter-spacing: 3px; margin-bottom: 30px; text-transform: uppercase; border-bottom: 3px solid var(--accent); }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; width: 92%; max-width: 500px; }
        .menu-item { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; position: relative; display: flex; flex-direction: column; }
        .image-container { width: 100%; height: 110px; overflow: hidden; background: #000; }
        .image-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .title-box { padding: 14px; text-align: center; font-size: 0.8rem; font-weight: 700; }
        .clickable { cursor: pointer; border: 1px solid var(--accent); }
        .clickable img { opacity: 1; }
        .locked { opacity: 0.6; filter: grayscale(0.8); }
        .status-badge { position: absolute; top: 8px; left: 8px; background: var(--accent); color: #000; font-size: 0.6rem; padding: 2px 8px; border-radius: 20px; font-weight: 800; z-index: 2; }
    </style>
</head>
<body>
    <h1>ASRAR PRO</h1>
    <div class="menu-grid" id="main-menu"></div>
    <script>
        const data = { "asrar": [
            { "id": 1, "titre": "Asrar", "image": "https://i.ibb.co/mryjJvhR/40688297-mystique-alchimique-cercle-secret-la-magie-cercle-pour-breloques-vectoriel.jpg" },
            { "id": 2, "titre": "Bibliothèque", "image": "https://i.ibb.co/zWf4zhFR/pile-livres-colores-1308-171741.jpg" },
            { "id": 3, "titre": "Marché & Services", "image": "https://i.ibb.co/933WytbF/a-shop-logo-little-town-market-11042322-png-sw800.png" },
            { "id": 4, "titre": "Planètes", "image": "https://i.ibb.co/5XHS58hc/saatan-ornament.png" },
            { "id": 5, "titre": "Chiffres", "image": "https://i.ibb.co/nqwHmSPh/61y8x3rk-XAL-AC-UF1000-1000-QL80.jpg" },
            { "id": 6, "titre": "Abajad", "image": "https://i.ibb.co/G35RKtJ7/9b0701045eeefb2a23fc82c027b80636-fgraphic.png" },
            { "id": 7, "titre": "Applications", "image": "https://i.ibb.co/xSWbhgYZ/What-Google-is-telling-app-developers-to-do-will-make-the-Play-Store-look-better.png" },
            { "id": 8, "titre": "Consultation", "image": "https://i.ibb.co/Rkc7wGWj/symbole-medical-plat-23-2149496593.jpg" }
        ]};
        const menu = document.getElementById('main-menu');
        data.asrar.forEach(item => {
            const card = document.createElement('div');
            if(item.id === 1) {
                card.className = 'menu-item clickable';
                card.onclick = () => window.location.href = 'asrar.html';
                card.innerHTML = `<div class="status-badge">ACCÈS</div>`;
            } else if(item.id === 2) {
                card.className = 'menu-item clickable';
                card.onclick = () => window.location.href = 'biblio.html';
                card.innerHTML = `<div class="status-badge" style="background:#fbbf24">LIVRES</div>`;
            } else { card.className = 'menu-item locked'; }
            card.innerHTML += `<div class="image-container"><img src="${item.image}"></div><div class="title-box">${item.titre}</div>`;
            menu.appendChild(card);
        });
    </script>
</body>
</html>
