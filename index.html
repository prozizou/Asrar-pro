<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ASRAR PRO - Hub</title>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8198863698846619" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg: #0f172a; --cuir: #3a1c0b; --or: #d9a06f; --texte: #f1e4c3;
        }

        body {
            background-color: var(--bg);
            color: var(--texte);
            font-family: 'Segoe UI', serif;
            margin: 0;
            padding: 15px;
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
        }

        .header-main {
            text-align: center;
            margin: 20px 0 30px;
        }

        h1 { color: var(--or); letter-spacing: 2px; text-transform: uppercase; margin: 0; }

        /* Grille dynamique */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        .menu-card {
            background: var(--cuir);
            border: 1px solid #5d3a1a;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .menu-card:active { transform: scale(0.96); }

        /* Wrapper d'image avec effet Glide */
        .img-box {
            width: 100%;
            height: 100px;
            background: #1a1a1a;
            overflow: hidden;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.4s;
        }

        .label-box {
            padding: 12px 5px;
            text-align: center;
            background: rgba(0,0,0,0.2);
        }

        .label-text {
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--or);
        }

        /* Zone Pub */
        .ad-footer {
            margin-top: 30px;
            min-height: 80px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header-main">
        <h1>ASRAR PRO</h1>
        <p style="font-size: 0.7rem; opacity: 0.6;">VOTRE GUIDE MYSTIQUE</p>
    </div>

    <div class="menu-grid" id="main-menu">
        </div>

    <div class="ad-footer">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-8198863698846619"
             data-ad-slot="votre-slot-id"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script>
        // Vos données JSON intégrées directement
        const menuData = {
          "asrar": [
            { "id": 1, "titre": "Asrar", "image": "https://i.ibb.co/mryjJvhR/40688297-mystique-alchimique-cercle-secret-la-magie-cercle-pour-breloques-vectoriel.jpg" },
            { "id": 2, "titre": "Bibliothèque", "image": "https://i.ibb.co/zWf4zhFR/pile-livres-colores-1308-171741.jpg" },
            { "id": 3, "titre": "Marché & Services", "image": "https://i.ibb.co/933WytbF/a-shop-logo-little-town-market-11042322-png-sw800.png" },
            { "id": 4, "titre": "Planètes", "image": "https://i.ibb.co/5XHS58hc/saatan-ornament.png" },
            { "id": 5, "titre": "Chiffres", "image": "https://i.ibb.co/nqwHmSPh/61y8x3rk-XAL-AC-UF1000-1000-QL80.jpg" },
            { "id": 6, "titre": "Abajad", "image": "https://i.ibb.co/G35RKtJ7/9b0701045eeefb2a23fc82c027b80636-fgraphic.png" },
            { "id": 7, "titre": "Applications", "image": "https://i.ibb.co/xSWbhgYZ/What-Google-is-telling-app-developers-to-do-will-make-the-Play-Store-look-better.png" },
            { "id": 8, "titre": "Consultation", "image": "https://i.ibb.co/Rkc7wGWj/symbole-medical-plat-23-2149496593.jpg" }
          ]
        };

        function renderMenu() {
            const grid = document.getElementById('main-menu');
            grid.innerHTML = menuData.asrar.map(item => `
                <div class="menu-card" onclick="handleNavigation('${item.titre}')">
                    <div class="img-box">
                        <img src="${item.image}" alt="${item.titre}" loading="lazy">
                    </div>
                    <div class="label-box">
                        <div class="label-text">${item.titre}</div>
                    </div>
                </div>
            `).join('');
        }

        function handleNavigation(titre) {
            // Logique de redirection automatique
            if (titre === "Marché & Services") {
                window.location.href = 'Market.html';
            } else if (titre === "Bibliothèque") {
                window.location.href = 'biblio.html';
            } else {
                alert("La section " + titre + " sera bientôt disponible.");
            }
        }

        window.onload = renderMenu;
    </script>
</body>
</html>
