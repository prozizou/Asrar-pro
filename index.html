<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASRAR PRO V2 - Accueil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>ASRAR PRO V2</h1>
        </header>

        <div class="menu-grid" id="menuGrid"></div>
    </div>

    <script>
        async function initialiserAccueil() {
            try {
                // 1. Lire le fichier local data.json
                const response = await fetch('data.json');
                const data = await response.json();
                const grid = document.getElementById('menuGrid');
                
                grid.innerHTML = ''; // On vide la grille avant de remplir

                // 2. Parcourir chaque catégorie du JSON
                Object.keys(data).forEach(cle => {
                    const categorie = data[cle];
                    
                    // Création de la carte (item)
                    const card = document.createElement('div');
                    card.className = 'menu-item';
                    
                    // On affiche le titre (ex: Protections)
                    card.innerHTML = `<p>${categorie.titre.toUpperCase()}</p>`;
                    
                    // ACTION AU CLIC : Rediriger vers asrar.html avec la clé Firebase
                    // Exemple : asrar.html?cat=db_sirr_protection
                    card.onclick = () => {
                        window.location.href = `asrar.html?cat=${cle}`;
                    };

                    grid.appendChild(card);
                });
            } catch (erreur) {
                console.error("Erreur lors du chargement de data.json :", erreur);
            }
        }

        // Lancer la fonction au chargement de la page
        window.onload = initialiserAccueil;
    </script>
</body>
</html>
