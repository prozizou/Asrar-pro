<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kanzou Pro Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <div class="loader"></div>
            <h1>KANZOU</h1>
        </div>
    </div>

    <button id="menu-toggle" onclick="toggleSidebar()">☰</button>
    <nav id="sidebar">
        <div class="sidebar-header">
            <h2>Catégories</h2>
            <button onclick="toggleSidebar()">✕</button>
        </div>
        <ul id="category-list"></ul>
    </nav>

    <div class="container">
        <header>
            <h1 id="categoryTitle">Menu</h1>
            <div class="search-area">
                <input type="text" id="searchInput" placeholder="Rechercher..." onkeyup="filtrerElements()">
                <button id="resetOrderBtn" onclick="reinitialiserOrdre()">Réinitialiser l'ordre</button>
            </div>
        </header>

        <div class="menu-grid" id="menuGrid"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
