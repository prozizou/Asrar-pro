<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASRAR PRO V2 - Accueil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header><h1>ASRAR PRO V2</h1></header>
        <div class="menu-grid" id="menuGrid"></div>
    </div>

    <script>
        async function chargerGrille() {
            const res = await fetch('data.json');
            const data = await res.json();
            const grid = document.getElementById('menuGrid');
            
            data.asrar.forEach(item => {
                const card = document.createElement('div');
                card.className = 'menu-item';
                card.innerHTML = `
                    <div class="icon-box"><img src="${item.image}"></div>
                    <p>${item.titre}</p>
                `;
                // Redirige vers la page Firebase en passant le nom de la DB
                card.onclick = () => window.location.href = `asrar.html?db=${item.db}`;
                grid.appendChild(card);
            });
        }
        window.onload = chargerGrille;
    </script>
</body>
</html>
