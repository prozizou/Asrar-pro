<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ASRAR PRO - Hub</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8198863698846619" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #0a0e17; --card: #161b2a; --text: #ffffff; --accent: #00bcd4; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin: 30px 0; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 480px; }
        .card { background: var(--card); border-radius: 12px; border: 1px solid #232d42; overflow: hidden; cursor: pointer; transition: 0.2s; position: relative; }
        .card:active { transform: scale(0.96); }
        .img-box { width: 100%; height: 100px; background: #000; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 12px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #232d42; }
        .title { font-size: 0.8rem; font-weight: 700; margin: 0; }
        .btn-go { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--accent); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; box-shadow: 0 0 10px rgba(0,188,212,0.3); }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="letter-spacing:-1px; margin:0;">ASRAR PRO</h1>
        <p style="font-size:0.7rem; color:#8899a6; text-transform:uppercase; letter-spacing:2px;">Intelligence Mystique</p>
    </div>
    <div class="grid" id="main-grid"></div>
    <script>
        const menu = { "asrar": [
            { "id": 1, "titre": "Asrar", "image": "https://i.ibb.co/mryjJvhR/40688297-mystique-alchimique-cercle-secret-la-magie-cercle-pour-breloques-vectoriel.jpg" },
            { "id": 2, "titre": "Bibliothèque", "image": "https://i.ibb.co/zWf4zhFR/pile-livres-colores-1308-171741.jpg" },
            { "id": 3, "titre": "Marché & Services", "image": "https://i.ibb.co/933WytbF/a-shop-logo-little-town-market-11042322-png-sw800.png" },
            { "id": 4, "titre": "Planètes", "image": "https://i.ibb.co/5XHS58hc/saatan-ornament.png" },
            { "id": 5, "titre": "Chiffres", "image": "https://i.ibb.co/nqwHmSPh/61y8x3rk-XAL-AC-UF1000-1000-QL80.jpg" },
            { "id": 6, "titre": "Abajad", "image": "https://i.ibb.co/G35RKtJ7/9b0701045eeefb2a23fc82c027b80636-fgraphic.png" },
            { "id": 7, "titre": "Applications", "image": "https://i.ibb.co/xSWbhgYZ/What-Google-is-telling-app-developers-to-do-will-make-the-Play-Store-look-better.png" },
            { "id": 8, "titre": "Consultation", "image": "https://i.ibb.co/Rkc7wGWj/symbole-medical-plat-23-2149496593.jpg" }
        ]};
        function render() {
            document.getElementById('main-grid').innerHTML = menu.asrar.map(item => `
                <div class="card" onclick="nav('${item.titre}')">
                    <div class="img-box"><img src="${item.image}"></div>
                    <div class="info"><h3 class="title">${item.titre}</h3><div class="btn-go">→</div></div>
                </div>
            `).join('');
        }
        function nav(t) {
            if(t==="Asrar") location.href="Asrar.html";
            else if(t==="Marché & Services") location.href="Market.html";
            else if(t==="Bibliothèque") location.href="biblio.html";
            else alert(t + " bientôt disponible.");
        }
        window.onload = render;
    </script>
</body>
</html>
