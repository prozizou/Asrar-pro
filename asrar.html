<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ASRAR PRO V2 - Discussion</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --couleur-fond: #0c0f0f;
            --couleur-sidebar: #1d2525;
            --couleur-accent: #2196f3;
            --bulle-utilisateur: #064e3b; /* Vert foncé pour vos messages */
            --bulle-autre: #1e293b; /* Gris bleu pour les autres */
        }

        body { background-color: var(--couleur-fond); color: white; margin: 0; font-family: Arial, sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .asrar-layout { display: flex; height: 100vh; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }

        /* Sidebar & Liste (Inchangé) */
        .asrar-sidebar { width: 110px; background: var(--couleur-sidebar); display: flex; flex-direction: column; align-items: center; padding-top: 20px; border-right: 1px solid #222; }
        .btn-nav { width: 90px; padding: 12px 2px; margin-bottom: 10px; background: #2c3636; border: none; color: #90a4ae; border-radius: 6px; font-size: 0.65rem; cursor: pointer; }
        .btn-nav.active { border-left: 4px solid var(--couleur-accent); background: #3e4e4e; color: white; }
        .asrar-main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .asrar-main::-webkit-scrollbar { display: none; }
        .vertical-feed { display: flex; flex-direction: column; align-items: center; gap: 40px; width: 100%; }
        .secret-card { width: 100%; max-width: 260px; text-align: center; cursor: pointer; }
        .card-img-box { border-radius: 12px; height: 240px; background: #fff; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .card-img-box img { max-width: 95%; max-height: 95%; object-fit: contain; }

        /* --- MODALE DE DISCUSSION (STYLE IMAGE 1000584161) --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; flex-direction: column; }
        
        .modal-header { background: #1d2525; padding: 15px; display: flex; align-items: center; border-bottom: 2px solid var(--couleur-accent); }
        .btn-back { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; margin-right: 15px; }
        #modal-title { font-size: 0.9rem; font-weight: bold; text-transform: uppercase; flex: 1; text-align: center; }

        .modal-body { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #0c0f0f; }
        .secret-info { margin-bottom: 20px; text-align: center; }
        .secret-info img { width: 100%; max-width: 300px; border-radius: 10px; }
        .secret-text { color: #ccc; padding: 15px; font-size: 1rem; line-height: 1.6; border-bottom: 1px solid #333; }

        /* Bulles de Discussion */
        .chat-bubble { max-width: 85%; padding: 10px 15px; border-radius: 12px; position: relative; font-size: 0.9rem; margin-bottom: 5px; }
        .bubble-me { align-self: flex-end; background: var(--bulle-utilisateur); border-bottom-right-radius: 2px; }
        .bubble-other { align-self: flex-start; background: var(--bulle-autre); border-bottom-left-radius: 2px; }
        .chat-user { font-size: 0.7rem; color: #90a4ae; margin-bottom: 4px; display: block; }
        .chat-time { font-size: 0.6rem; color: rgba(255,255,255,0.4); text-align: right; margin-top: 5px; }

        /* Barre d'envoi */
        .chat-input-area { background: #1d2525; padding: 10px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #333; }
        #chatInput { flex: 1; background: #0c0f0f; border: 1px solid #444; color: white; padding: 12px; border-radius: 25px; outline: none; }
        .btn-send { background: none; border: none; cursor: pointer; display: flex; align-items: center; }
        .btn-send img { width: 35px; }
    </style>
</head>
<body>

    <div class="asrar-layout">
        <aside class="asrar-sidebar">
            <button onclick="window.location.href='index.html'" style="background:none; border:none; color:#4fd1c5; font-size:1.8rem; margin-bottom:25px;">⬅</button>
            <nav id="nav-categories">
                <button onclick="changerCategorie('db_sirr_protection', this)" class="btn-nav active">Protections</button>
                <button onclick="changerCategorie('db_sirr_ouverture', this)" class="btn-nav">Ouvertures</button>
                <button onclick="changerCategorie('db_sirr_deblocage', this)" class="btn-nav">Déblocages</button>
                <button onclick="changerCategorie('db_sirr_ilham', this)" class="btn-nav">Ilham</button>
                <button onclick="changerCategorie('db_sirr_domptage', this)" class="btn-nav">Domptages</button>
            </nav>
        </aside>

        <main class="asrar-main">
            <div id="container-liste" class="vertical-feed"></div>
            <button id="loadMoreBtn" class="btn-load-more" onclick="chargerData()" style="display:none; background:#2c3636; color:white; padding:10px 20px; border-radius:20px; border:1px solid #444; margin:20px 0;">CHARGER PLUS</button>
        </main>
    </div>

    <div id="ma-modale" class="modal-overlay">
        <div class="modal-header">
            <button class="btn-back" onclick="fermerModale()">←</button>
            <div id="modal-title">ANTI FORNICATION</div>
        </div>
        
        <div id="chat-body" class="modal-body">
            <div class="secret-info">
                <div id="modal-img"></div>
                <div id="modal-sirr" class="secret-text"></div>
            </div>
            <div id="chat-messages" style="display: flex; flex-direction: column; gap: 15px;"></div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Commenter ici...">
            <button class="btn-send" onclick="envoyerMessage()">
                <img src="https://www.gstatic.com/images/branding/product/2x/play_prism_64dp.png" alt="Envoyer">
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBLzPKzbiNYitUz7sv9Ftqm0oF20rA32Zk",
            authDomain: "asrar-bc059.firebaseapp.com",
            databaseURL: "https://asrar-bc059.firebaseio.com",
            projectId: "asrar-bc059",
            storageBucket: "asrar-bc059.appspot.com",
            appId: "1:199810893447:android:044629472e10f9eb68da22"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let cheminActuel = 'db_sirr_protection';
        let secretActuelKey = null;
        let dernierKey = null;
        const TAILLE_PAGE = 10;

        // --- CHARGEMENT DES SECRETS ---
        function changerCategorie(chemin, bouton) {
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
            if(bouton) bouton.classList.add('active');
            cheminActuel = chemin;
            dernierKey = null;
            document.getElementById('container-liste').innerHTML = '';
            chargerData();
        }

        function chargerData() {
            let query = db.ref(cheminActuel).orderByKey().limitToFirst(TAILLE_PAGE);
            if (dernierKey) query = db.ref(cheminActuel).orderByKey().startAfter(dernierKey).limitToFirst(TAILLE_PAGE);

            query.once('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    const keys = Object.keys(data);
                    dernierKey = keys[keys.length - 1];
                    Object.keys(data).forEach(key => {
                        const item = data[key];
                        item.db_key = key; // On garde la clé Firebase
                        afficherUnSecret(item);
                    });
                    document.getElementById('loadMoreBtn').style.display = (keys.length === TAILLE_PAGE) ? 'block' : 'none';
                }
            });
        }

        function afficherUnSecret(item) {
            const feed = document.getElementById('container-liste');
            const card = document.createElement('div');
            card.className = 'secret-card';
            const img = item.img || "https://via.placeholder.com/200";
            card.innerHTML = `<div class="card-img-box"><img src="${img}"></div><div style="margin-top:10px; font-size:0.75rem;">${item.faida}</div>`;
            card.onclick = () => ouvrirDiscussion(item);
            feed.appendChild(card);
        }

        // --- SYSTÈME DE DISCUSSION ---
        function ouvrirDiscussion(item) {
            secretActuelKey = item.db_key; // On lie les messages à cette clé
            document.getElementById('modal-title').innerText = item.faida || "DÉTAIL";
            document.getElementById('modal-sirr').innerText = item.sirr || "";
            document.getElementById('modal-img').innerHTML = `<img src="${item.img || ''}">`;
            document.getElementById('chat-messages').innerHTML = ""; // Vider avant chargement
            
            document.getElementById('ma-modale').style.display = 'flex';
            
            // Écouter les messages en temps réel
            db.ref('discussions/' + secretActuelKey).on('value', (snapshot) => {
                const messages = snapshot.val();
                const container = document.getElementById('chat-messages');
                container.innerHTML = "";
                if(messages) {
                    Object.values(messages).forEach(msg => {
                        const bulle = document.createElement('div');
                        const isMe = msg.user === "Moi"; // À remplacer par l'email utilisateur réel
                        bulle.className = `chat-bubble ${isMe ? 'bubble-me' : 'bubble-other'}`;
                        bulle.innerHTML = `
                            <span class="chat-user">${msg.user}</span>
                            ${msg.text}
                            <div class="chat-time">${msg.date}</div>
                        `;
                        container.appendChild(bulle);
                    });
                    // Scroll auto vers le bas
                    document.getElementById('chat-body').scrollTop = document.getElementById('chat-body').scrollHeight;
                }
            });
        }

        function envoyerMessage() {
            const input = document.getElementById('chatInput');
            if(input.value.trim() === "") return;

            const nouveauMsg = {
                user: "utilisateur@gmail.com", // Simulation de l'email
                text: input.value,
                date: new Date().toLocaleString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' })
            };

            db.ref('discussions/' + secretActuelKey).push(nouveauMsg);
            input.value = "";
        }

        function fermerModale() {
            db.ref('discussions/' + secretActuelKey).off(); // Stopper l'écoute
            document.getElementById('ma-modale').style.display = 'none';
        }

        window.onload = () => chargerData();
    </script>
</body>
</html>
