<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASRAR PRO V2 - Liste</title>
    <link rel="stylesheet" href="asrar.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>
    <div class="asrar-layout">
        <aside class="asrar-sidebar">
            <div class="sidebar-top">
                <button onclick="window.location.href='index.html'" class="back-btn">⬅</button>
                <div class="notif-badge">15</div>
            </div>
            <nav id="side-menu">
                <button onclick="loadFB('db_sirr_protection', this)" id="btn-prot">Protections</button>
                <button onclick="loadFB('db_sirr_ouverture', this)">Ouvertures</button>
                <button onclick="loadFB('db_sirr_deblocage', this)">Déblocages</button>
                <button onclick="loadFB('db_sirr_ilham', this)">Ilham</button>
                <button onclick="loadFB('db_sirr_domptage', this)">Domptages</button>
            </nav>
        </aside>

        <main class="asrar-content">
            <div id="vertical-list" class="v-list">
                </div>
        </main>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="m-img"></div>
            <h2 id="m-titre"></h2>
            <p id="m-faida"></p>
            <button class="close-btn" onclick="closeModal()">FERMER</button>
        </div>
    </div>

    <script>
        // Configuration extraite de votre google-services.json
        const firebaseConfig = {
            apiKey: "AIzaSyBLzPKzbiNYitUz7sv9Ftqm0oF20rA32Zk",
            authDomain: "asrar-bc059.firebaseapp.com",
            databaseURL: "https://asrar-bc059.firebaseio.com",
            projectId: "asrar-bc059",
            storageBucket: "asrar-bc059.appspot.com",
            appId: "1:199810893447:android:044629472e10f9eb68da22"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const params = new URLSearchParams(window.location.search);
        const currentDb = params.get('db') || 'db_sirr_protection';

        function loadFB(path, btn) {
            // Mise à jour visuelle des boutons du menu latéral
            document.querySelectorAll('#side-menu button').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');

            db.ref(path).on('value', (snapshot) => {
                const list = document.getElementById('vertical-list');
                list.innerHTML = '';
                const data = snapshot.val();

                if(data) {
                    Object.keys(data).forEach(key => {
                        const item = data[key];
                        const card = document.createElement('div');
                        card.className = 'asrar-card';
                        
                        // Structure respectant vos clés : 'image' et 'titre'
                        card.innerHTML = `
                            <div class="img-container">
                                <img src="${item.image}" alt="chargement...">
                            </div>
                            <div class="card-title">${item.titre.toUpperCase()}</div>
                        `;
                        
                        card.onclick = () => openDetails(item);
                        list.appendChild(card);
                    });
                }
            });
        }

        function openDetails(item) {
            document.getElementById('m-titre').innerText = item.titre;
            document.getElementById('m-faida').innerText = item.faida;
            const imgDiv = document.getElementById('m-img');
            imgDiv.innerHTML = item.img ? `<img src="${item.img}" style="width:100%; border-radius:10px;">` : '';
            document.getElementById('modal').style.display = "flex";
        }

        function closeModal() {
            document.getElementById('modal').style.display = "none";
        }

        // Lancement initial
        window.onload = () => {
            const btnInitial = document.getElementById('btn-prot');
            loadFB(currentDb, btnInitial);
        };
    </script>
</body>
</html>
