<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ASRAR PRO - L'Intégrale</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #0f172a; --sidebar: #1e293b; --text: #f8fafc;
            --accent: #38bdf8; --card: #1e293b; --gold: #fbbf24;
            --fire: linear-gradient(90deg, #f87171, #f472b6);
            --img-fallback: linear-gradient(45deg, #1e293b, #334155);
        }

        body { background-color: var(--bg); color: var(--text); margin: 0; font-family: 'Inter', sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .asrar-layout { display: flex; height: 100vh; }

        /* SIDEBAR ÉTENDUE */
        .sidebar { width: 75px; background: var(--sidebar); display: flex; flex-direction: column; align-items: center; padding-top: 20px; border-right: 1px solid rgba(255,255,255,0.05); z-index: 10; }
        .nav-item { width: 50px; height: 50px; margin-bottom: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; background: transparent; color: #64748b; transition: 0.3s; font-size: 1.2rem; }
        .nav-item.active { background: var(--accent); color: white; box-shadow: 0 8px 15px rgba(56, 189, 248, 0.2); }

        /* CONTENU AVEC ANIMATION */
        .main-content { flex: 1; overflow-y: auto; padding: 10px; transition: opacity 0.4s ease; }
        .fade-out { opacity: 0; }

        .podium { display: flex; justify-content: center; gap: 15px; padding: 20px 10px; background: rgba(0,0,0,0.15); border-radius: 20px; margin: 10px; }
        .p-circle { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--accent); position: relative; background: var(--img-fallback); overflow: hidden; }
        .p-circle img { width: 100%; height: 100%; object-fit: cover; }
        .p-rank { position: absolute; bottom: 0; right: 0; background: var(--gold); border-radius: 50%; width: 20px; height: 20px; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; border: 2px solid var(--bg); }

        .card { background: var(--card); border-radius: 18px; padding: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .card-img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; background: var(--img-fallback); }
        .card-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; flex: 1; }
        .power-line { width: 100%; height: 4px; background: rgba(100,116,139,0.1); border-radius: 10px; margin-top: 5px; overflow: hidden; }
        .power-fill { height: 100%; background: var(--fire); transition: width 1s; }

        /* MODALE */
        .modal { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 1000; flex-direction: column; }
        .modal-header { padding: 15px; display: flex; align-items: center; justify-content: space-between; background: var(--sidebar); }
        .modal-content { flex: 1; overflow-y: auto; padding: 20px; }
        .bubble { padding: 10px; border-radius: 12px; margin-bottom: 8px; background: var(--sidebar); font-size: 0.85rem; border-left: 3px solid var(--accent); }
    </style>
</head>
<body>

    <div class="asrar-layout">
        <nav class="sidebar">
            <button class="nav-item active" onclick="switchCat('db_sirr_protection', this)" title="Protections">🛡️</button>
            <button class="nav-item" onclick="switchCat('db_sirr_ouverture', this)" title="Ouvertures">🔓</button>
            <button class="nav-item" onclick="switchCat('db_sirr_deblocage', this)" title="Déblocages">✨</button>
            <button class="nav-item" onclick="switchCat('db_sirr_domptage', this)" title="Domptages">🦁</button>
            <button class="nav-item" onclick="switchCat('db_sirr_ilham', this)" title="Ilham">🧠</button>
        </nav>

        <main class="main-content" id="main-view">
            <div class="podium" id="podium"></div>
            <div id="feed"></div>
        </main>
    </div>

    <div id="modal" class="modal">
        <div class="modal-header">
            <button onclick="closeModal()" style="background:none; border:none; color:white; font-size:1.5rem;">✕</button>
            <span id="m-title" style="font-weight:700; font-size:0.7rem;"></span>
            <div onclick="addLike()" style="cursor:pointer;">❤️</div>
        </div>
        <div class="modal-content" id="m-scroll">
            <img id="m-img" style="width:100%; border-radius:20px; margin-bottom:15px;">
            <div id="m-sirr" style="line-height:1.6; margin-bottom:20px;"></div>
            <div id="m-chat"></div>
        </div>
        <div style="padding:10px; background:var(--sidebar); display:flex; gap:5px;">
            <input type="text" id="chatInput" placeholder="Commenter..." style="flex:1; border-radius:20px; padding:10px; border:none; background:var(--bg); color:white;">
            <button onclick="send()" style="background:var(--accent); border:none; color:white; padding:10px 15px; border-radius:20px;">OK</button>
        </div>
    </div>

    <script>
        const config = { databaseURL: "https://asrar-bc059.firebaseio.com" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let currentCat = 'db_sirr_protection';
        let currentID = null;
        const user = { name: "Disciple_" + Math.floor(Math.random()*999) };

        function switchCat(cat, btn) {
            const view = document.getElementById('main-view');
            view.classList.add('fade-out'); // Animation de sortie
            
            setTimeout(() => {
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCat = cat;
                loadData();
                view.classList.remove('fade-out'); // Animation d'entrée
            }, 400);
        }

        function loadData() {
            db.ref(currentCat).on('value', snap => {
                const data = snap.val(); if(!data) { document.getElementById('feed').innerHTML = ""; return; }
                const items = Object.keys(data).map(k => ({...data[k], key: k})).sort((a,b) => (b.likes||0)-(a.likes||0));
                
                // Podium
                document.getElementById('podium').innerHTML = items.slice(0,3).map((it, i) => `
                    <div class="p-circle" onclick="openModal('${it.key}')">
                        <img src="${it.img || ''}" onerror="this.style.display='none'">
                        <div class="p-rank">${i+1}</div>
                    </div>
                `).join('');

                // Liste
                document.getElementById('feed').innerHTML = items.map(it => `
                    <div class="card" onclick="openModal('${it.key}')">
                        <img src="${it.img || ''}" class="card-img" onerror="this.style.display='none'">
                        <div style="flex:1">
                            <div class="card-title">${it.faida}</div>
                            <div class="power-line"><div class="power-fill" style="width:${Math.min((it.likes||0)*5, 100)}%"></div></div>
                        </div>
                        <div style="font-size:0.7rem;">${it.likes||0} ❤️</div>
                    </div>
                `).join('');
            });
        }

        function openModal(id) {
            currentID = id;
            db.ref(`${currentCat}/${id}`).once('value', snap => {
                const it = snap.val();
                document.getElementById('m-title').innerText = it.faida.toUpperCase();
                document.getElementById('m-sirr').innerText = it.sirr;
                document.getElementById('m-img').src = it.img || '';
                document.getElementById('modal').style.display = 'flex';
            });
            db.ref('discussions/'+id).on('value', snap => {
                const msgs = snap.val();
                document.getElementById('m-chat').innerHTML = msgs ? Object.values(msgs).map(m => `<div class="bubble"><b>${m.user}</b>${m.text}</div>`).join('') : '';
            });
        }

        function addLike() { db.ref(`${currentCat}/${currentID}/likes`).transaction(c => (c||0)+1); }
        function send() {
            const inp = document.getElementById('chatInput');
            if(!inp.value) return;
            db.ref('discussions/'+currentID).push({ user: user.name, text: inp.value });
            inp.value = '';
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; db.ref('discussions/'+currentID).off(); }

        window.onload = loadData;
    </script>
</body>
</html>
