<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ASRAR PRO - Design Elite</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #0f172a; --sidebar: #1e293b; --text: #f8fafc;
            --accent: #38bdf8; --card: #1e293b; --gold: #fbbf24;
            --fire: linear-gradient(90deg, #f87171, #f472b6);
        }

        body.light-mode {
            --bg: #f1f5f9; --sidebar: #ffffff; --text: #0f172a;
            --accent: #0284c7; --card: #ffffff;
        }

        body { background-color: var(--bg); color: var(--text); margin: 0; font-family: 'Inter', system-ui, sans-serif; transition: 0.3s; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .asrar-layout { display: flex; height: 100vh; }

        /* SIDEBAR MINIMALISTE */
        .sidebar { width: 70px; background: var(--sidebar); display: flex; flex-direction: column; align-items: center; padding-top: 20px; border-right: 1px solid rgba(255,255,255,0.05); }
        .nav-item { width: 50px; height: 50px; margin-bottom: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; background: transparent; color: #64748b; font-size: 1.2rem; transition: 0.2s; }
        .nav-item.active { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3); }

        /* PODIUM DISCRET */
        .podium { display: flex; justify-content: center; gap: 20px; padding: 20px 0; background: rgba(0,0,0,0.2); border-radius: 24px; margin: 10px; }
        .p-circle { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--accent); position: relative; cursor: pointer; }
        .p-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .p-rank { position: absolute; bottom: -5px; right: -5px; background: var(--gold); border-radius: 50%; width: 20px; height: 20px; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; }

        /* LISTE STYLE CARTE */
        .main-content { flex: 1; overflow-y: auto; padding: 10px; }
        .card { background: var(--card); border-radius: 20px; padding: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .card-img { width: 64px; height: 64px; border-radius: 14px; object-fit: cover; background: #334155; }
        .card-body { flex: 1; }
        .card-title { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }

        /* POWER LINE (Subtile) */
        .power-line { width: 100%; height: 3px; background: rgba(100,116,139,0.2); border-radius: 2px; overflow: hidden; }
        .power-fill { height: 100%; background: var(--fire); transition: width 1s; }

        /* MODALE PLEIN ÉCRAN */
        .modal { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 1000; flex-direction: column; }
        .modal-header { padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .modal-content { flex: 1; overflow-y: auto; padding: 20px; }
        
        /* CHAT BUBBLES */
        .bubble { padding: 12px 16px; border-radius: 18px; margin-bottom: 10px; max-width: 85%; font-size: 0.9rem; line-height: 1.4; background: var(--sidebar); border: 1px solid rgba(255,255,255,0.05); }
        .bubble b { color: var(--accent); display: block; font-size: 0.75rem; margin-bottom: 4px; }

        .input-bar { padding: 15px; background: var(--sidebar); display: flex; gap: 10px; }
        .input-bar input { flex: 1; background: var(--bg); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 12px 20px; border-radius: 25px; outline: none; }
    </style>
</head>
<body>

    <div class="asrar-layout">
        <nav class="sidebar">
            <div onclick="toggleMode()" style="cursor:pointer; margin-bottom:30px;">🌙</div>
            <button class="nav-item active" onclick="load('db_sirr_protection', this)">🛡️</button>
            <button class="nav-item" onclick="load('db_sirr_ouverture', this)">🔓</button>
            <button class="nav-item" onclick="load('db_sirr_deblocage', this)">✨</button>
        </nav>

        <main class="main-content">
            <div class="podium" id="podium"></div>
            <div id="feed"></div>
        </main>
    </div>

    <div id="modal" class="modal">
        <div class="modal-header">
            <button onclick="closeModal()" style="background:none; border:none; color:var(--text); font-size:1.5rem;">✕</button>
            <span id="m-title" style="font-size:0.8rem; font-weight:600;"></span>
            <div onclick="addLike()" style="cursor:pointer; font-size:1.2rem;">❤️</div>
        </div>
        <div class="modal-content" id="m-scroll">
            <img id="m-img" style="width:100%; border-radius:24px; margin-bottom:20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
            <div id="m-sirr" style="margin-bottom:30px; font-size:1rem; opacity:0.9; line-height:1.7;"></div>
            <div id="m-chat"></div>
        </div>
        <div class="input-bar">
            <input type="text" id="chatInput" placeholder="Dire quelque chose...">
            <button onclick="send()" style="background:var(--accent); color:white; border:none; padding:10px 20px; border-radius:20px; font-weight:600;">ENVOYER</button>
        </div>
    </div>

    <script>
        const config = { databaseURL: "https://asrar-bc059.firebaseio.com" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let currentCat = 'db_sirr_protection';
        let currentID = null;
        const user = JSON.parse(localStorage.getItem('asrar_user')) || { name: "Disciple_" + Math.floor(Math.random()*999) };

        function toggleMode() { document.body.classList.toggle('light-mode'); }

        function load(cat, btn) {
            if(btn) {
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            currentCat = cat;
            db.ref(cat).on('value', snap => {
                const data = snap.val(); if(!data) return;
                const items = Object.keys(data).map(k => ({...data[k], key: k})).sort((a,b) => (b.likes||0)-(a.likes||0));
                
                // Podium
                const pod = document.getElementById('podium');
                pod.innerHTML = items.slice(0,3).map((it, i) => `
                    <div class="p-circle" onclick="openModal('${it.key}')">
                        <img src="${it.img}">
                        <div class="p-rank">${i+1}</div>
                    </div>
                `).join('');

                // Feed
                document.getElementById('feed').innerHTML = items.map(it => `
                    <div class="card" onclick="openModal('${it.key}')">
                        <img src="${it.img}" class="card-img">
                        <div class="card-body">
                            <div class="card-title">${it.faida}</div>
                            <div class="power-line"><div class="power-fill" style="width:${Math.min(it.likes||0, 100)}%"></div></div>
                        </div>
                        <div style="font-size:0.7rem; color:#64748b;">${it.likes||0} ❤️</div>
                    </div>
                `).join('');
            });
        }

        function openModal(id) {
            currentID = id;
            db.ref(`${currentCat}/${id}`).once('value', snap => {
                const it = snap.val();
                document.getElementById('m-title').innerText = it.faida;
                document.getElementById('m-sirr').innerText = it.sirr;
                document.getElementById('m-img').src = it.img;
                document.getElementById('modal').style.display = 'flex';
                window.history.pushState({m:true}, "");
            });

            db.ref('discussions/'+id).on('value', snap => {
                const msgs = snap.val();
                document.getElementById('m-chat').innerHTML = msgs ? Object.values(msgs).map(m => `
                    <div class="bubble"><b>${m.user}</b>${m.text}</div>
                `).join('') : '';
                document.getElementById('m-scroll').scrollTop = 99999;
            });
        }

        function addLike() { db.ref(`${currentCat}/${currentID}/likes`).transaction(c => (c||0)+1); }
        
        function send() {
            const inp = document.getElementById('chatInput');
            if(!inp.value) return;
            db.ref('discussions/'+currentID).push({ user: user.name, text: inp.value });
            inp.value = '';
        }

        function closeModal() { 
            document.getElementById('modal').style.display = 'none'; 
            db.ref('discussions/'+currentID).off();
        }

        window.onpopstate = closeModal;
        window.onload = () => load(currentCat);
    </script>
</body>
</html>
