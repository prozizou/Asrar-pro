<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0c0f0f">
    <title>ASRAR PRO V2 - Premium Glass</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --couleur-fond: #0c0f0f;
            --couleur-sidebar: rgba(29, 37, 37, 0.7); /* Transparence pour le verre */
            --couleur-accent: #2196f3;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body { 
            background-color: var(--couleur-fond); 
            color: white; 
            margin: 0; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden;
            position: fixed; width: 100%; height: 100%;
            /* Fond avec un léger dégradé pour accentuer l'effet de profondeur */
            background: radial-gradient(circle at top right, #1a2a2a, #0c0f0f);
        }

        .asrar-layout { 
            display: flex; 
            height: 100vh;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }

        /* SIDEBAR GLASSMORPHISM */
        .asrar-sidebar { 
            width: 105px; 
            background: var(--couleur-sidebar); 
            backdrop-filter: blur(15px); /* L'effet de flou crucial */
            -webkit-backdrop-filter: blur(15px);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 20px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .btn-nav { 
            width: 85px; padding: 12px 2px; margin-bottom: 12px; 
            background: rgba(44, 54, 54, 0.6); border: 1px solid rgba(255,255,255,0.05); 
            color: #90a4ae; border-radius: 10px; font-size: 0.65rem; cursor: pointer; 
            transition: all 0.3s ease;
        }

        .btn-nav.active { 
            background: var(--couleur-accent); 
            color: white; 
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.4);
            transform: scale(1.05);
        }

        /* MAIN CONTENT */
        .asrar-main { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            scroll-behavior: smooth;
        }
        .asrar-main::-webkit-scrollbar { display: none; }

        /* BARRE DE RECHERCHE GLASS */
        .search-box { 
            width: 100%; max-width: 320px; 
            position: sticky; top: 0; z-index: 50; 
            padding-bottom: 25px;
        }

        #searchInput { 
            width: 100%; padding: 14px; border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(26, 26, 26, 0.8); 
            backdrop-filter: blur(10px);
            color: white; outline: none; text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        /* CARTES & SHIMMER */
        .vertical-feed { display: flex; flex-direction: column; align-items: center; gap: 45px; width: 100%; }
        
        .secret-card { 
            width: 100%; max-width: 280px; text-align: center; cursor: pointer; 
            transition: transform 0.3s ease;
        }
        .secret-card:active { transform: scale(0.95); }

        .card-img-box {
            border-radius: 20px; padding: 8px; border: 1px solid rgba(255,255,255,0.1); 
            height: 260px; display: flex; align-items: center; justify-content: center; 
            position: relative; overflow: hidden; background: #fff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .loading-shimmer {
            background-color: #f0f0f0;
            background-image: linear-gradient(90deg, #f0f0f0 0%, #e0e0e0 20%, #f0f0f0 40%, #f0f0f0 100%);
            background-repeat: no-repeat; background-size: 800px 260px;
            animation: shimmer 2s infinite linear;
        }

        .loading-shimmer::after {
            content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
            animation: glide 2.5s infinite linear;
        }

        @keyframes shimmer { 0% { background-position: -468px 0; } 100% { background-position: 468px 0; } }
        @keyframes glide { 0% { left: -100%; } 100% { left: 100%; } }

        .card-img-box img { max-width: 92%; max-height: 92%; object-fit: contain; opacity: 0; transition: opacity 0.8s ease-in; }
        .img-loaded { opacity: 1 !important; }
        
        .card-label { 
            margin-top: 15px; font-size: 0.8rem; font-weight: 600; 
            color: rgba(255,255,255,0.9); letter-spacing: 0.8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .btn-load-more { 
            background: rgba(33, 150, 243, 0.1); color: var(--couleur-accent); 
            border: 1px solid var(--couleur-accent); padding: 14px 40px; 
            border-radius: 30px; margin: 40px 0; cursor: pointer; font-weight: bold;
            transition: 0.3s;
        }
        .btn-load-more:active { background: var(--couleur-accent); color: white; }

        /* MODALE PREMIUM */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 1000; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-card { 
            background: rgba(30, 30, 30, 0.9); border: 1px solid rgba(255,255,255,0.1);
            width: 100%; max-width: 500px; padding: 30px; border-radius: 25px; 
            max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }
        .detail-img img { width: 100%; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .detail-txt { color: #e0e0e0; line-height: 1.8; font-size: 1.1rem; white-space: pre-wrap; }
        .btn-fermer { background: var(--couleur-accent); color: white; border: none; padding: 16px; border-radius: 12px; margin-top: 30px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="asrar-layout">
        <aside class="asrar-sidebar">
            <button onclick="window.location.href='index.html'" style="background:none; border:none; color:#4fd1c5; font-size:2rem; cursor:pointer; margin-bottom:30px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));">⬅</button>
            <nav id="nav-categories">
                <button onclick="changerCategorie('db_sirr_protection', this)" class="btn-nav active">Protections</button>
                <button onclick="changerCategorie('db_sirr_ouverture', this)" class="btn-nav">Ouvertures</button>
                <button onclick="changerCategorie('db_sirr_deblocage', this)" class="btn-nav">Déblocages</button>
                <button onclick="changerCategorie('db_sirr_ilham', this)" class="btn-nav">Ilham</button>
                <button onclick="changerCategorie('db_sirr_domptage', this)" class="btn-nav">Domptages</button>
            </nav>
        </aside>

        <main class="asrar-main">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Rechercher un secret..." onkeyup="filtrerListe()">
            </div>
            <div id="container-liste" class="vertical-feed"></div>
            <button id="loadMoreBtn" class="btn-load-more" onclick="chargerData()" style="display:none;">VOIR PLUS DE SECRETS</button>
        </main>
    </div>

    <div id="ma-modale" class="modal-overlay" onclick="fermerModale()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div id="modal-img" class="detail-img"></div>
            <h2 id="modal-title" style="margin-top:0; font-size:1.6rem; color:var(--couleur-accent); text-align:center;"></h2>
            <div id="modal-sirr" class="detail-txt"></div>
            <button class="btn-fermer" onclick="fermerModale()">FERMER</button>
        </div>
    </div>

    <script>
        const IMG_DE_SECOURS = "https://i.supaimg.com/2a53ec6e-056d-4b1b-9b10-28f105901a55/465d1949-acb8-4008-b88c-f6a53388fe0a.jpg";
        const firebaseConfig = {
            apiKey: "AIzaSyBLzPKzbiNYitUz7sv9Ftqm0oF20rA32Zk",
            authDomain: "asrar-bc059.firebaseapp.com",
            databaseURL: "https://asrar-bc059.firebaseio.com",
            projectId: "asrar-bc059",
            storageBucket: "asrar-bc059.appspot.com",
            appId: "1:199810893447:android:044629472e10f9eb68da22"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let cheminActuel = 'db_sirr_protection';
        let dernierKey = null;
        let secretsAffiches = [];
        const TAILLE_PAGE = 10;

        function changerCategorie(chemin, bouton) {
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
            if(bouton) bouton.classList.add('active');
            cheminActuel = chemin;
            dernierKey = null;
            secretsAffiches = [];
            document.getElementById('container-liste').innerHTML = '';
            document.getElementById('searchInput').value = '';
            chargerData();
        }

        function chargerData() {
            let query = db.ref(cheminActuel).orderByKey().limitToFirst(TAILLE_PAGE);
            if (dernierKey) {
                query = db.ref(cheminActuel).orderByKey().startAfter(dernierKey).limitToFirst(TAILLE_PAGE);
            }

            query.once('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    const keys = Object.keys(data);
                    dernierKey = keys[keys.length - 1];
                    const nouveauxSecrets = Object.values(data);
                    secretsAffiches = [...secretsAffiches, ...nouveauxSecrets];
                    afficherSecrets(nouveauxSecrets, false);
                    document.getElementById('loadMoreBtn').style.display = (keys.length === TAILLE_PAGE) ? 'block' : 'none';
                } else {
                    document.getElementById('loadMoreBtn').style.display = 'none';
                }
            });
        }

        function afficherSecrets(liste, reset) {
            const feed = document.getElementById('container-liste');
            if(reset) feed.innerHTML = '';

            liste.forEach(item => {
                const card = document.createElement('div');
                card.className = 'secret-card';
                const imageSrc = item.img && item.img !== "" ? item.img : IMG_DE_SECOURS;

                card.innerHTML = `
                    <div class="card-img-box loading-shimmer">
                        <img src="${imageSrc}" onload="handleImgLoad(this)" onerror="this.src='${IMG_DE_SECOURS}'; handleImgLoad(this);">
                    </div>
                    <div class="card-label">${(item.faida || '').toUpperCase()}</div>
                `;
                card.onclick = () => ouvrirModale(item);
                feed.appendChild(card);
            });
        }

        function handleImgLoad(img) {
            img.classList.add('img-loaded');
            img.parentElement.classList.remove('loading-shimmer');
        }

        function filtrerListe() {
            const terme = document.getElementById('searchInput').value.toLowerCase();
            if(terme === "") {
                afficherSecrets(secretsAffiches, true);
                document.getElementById('loadMoreBtn').style.display = (secretsAffiches.length >= TAILLE_PAGE) ? 'block' : 'none';
            } else {
                const filtres = secretsAffiches.filter(s => s.faida && s.faida.toLowerCase().includes(terme));
                afficherSecrets(filtres, true);
                document.getElementById('loadMoreBtn').style.display = 'none';
            }
        }

        function ouvrirModale(item) {
            document.getElementById('modal-title').innerText = item.faida || '';
            document.getElementById('modal-sirr').innerText = item.sirr || '';
            const imageSrc = item.img && item.img !== "" ? item.img : IMG_DE_SECOURS;
            document.getElementById('modal-img').innerHTML = `<img src="${imageSrc}">`;
            document.getElementById('ma-modale').style.display = 'flex';
        }

        function fermerModale() { document.getElementById('ma-modale').style.display = 'none'; }

        window.onload = () => chargerData();
    </script>
</body>
</html>
