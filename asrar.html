<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0c0f0f">
    <title>ASRAR PRO V2 - Stable Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --couleur-fond: #0c0f0f;
            --couleur-sidebar: #1d2525;
            --couleur-accent: #2196f3;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body { 
            background-color: var(--couleur-fond); 
            color: white; 
            margin: 0; 
            font-family: Arial, sans-serif; 
            overflow: hidden;
            position: fixed; width: 100%; height: 100%;
        }

        .asrar-layout { 
            display: flex; 
            height: 100vh;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }

        /* Sidebar Classique */
        .asrar-sidebar { 
            width: 110px; 
            background: var(--couleur-sidebar); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 20px;
            border-right: 1px solid #222;
        }

        .btn-nav { 
            width: 90px; padding: 12px 2px; margin-bottom: 10px; 
            background: #2c3636; border: none; color: #90a4ae; 
            border-radius: 6px; font-size: 0.65rem; cursor: pointer; 
        }

        .btn-nav.active { border-left: 4px solid var(--couleur-accent); background: #3e4e4e; color: white; }

        /* Zone Principale */
        .asrar-main { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }
        .asrar-main::-webkit-scrollbar { display: none; }

        .search-box { 
            width: 100%; max-width: 300px; 
            position: sticky; top: 0; z-index: 10; 
            background: var(--couleur-fond); padding-bottom: 20px; 
        }

        #searchInput { 
            width: 100%; padding: 12px; border-radius: 25px; 
            border: 1px solid #333; background: #1a1a1a; 
            color: white; outline: none; text-align: center; 
        }

        /* Cartes & Shimmer */
        .vertical-feed { display: flex; flex-direction: column; align-items: center; gap: 40px; width: 100%; }
        .secret-card { width: 100%; max-width: 260px; text-align: center; cursor: pointer; }

        .card-img-box {
            border-radius: 12px; padding: 5px; border: 1px solid #666; height: 240px; 
            display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
            background: #fff;
        }

        .loading-shimmer {
            background-color: #f6f7f8;
            background-image: linear-gradient(90deg, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
            background-repeat: no-repeat; background-size: 800px 240px;
            animation: shimmer 2s infinite linear;
        }

        .loading-shimmer::after {
            content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
            animation: glide 3s infinite;
        }

        @keyframes shimmer { 0% { background-position: -468px 0; } 100% { background-position: 468px 0; } }
        @keyframes glide { 0% { left: -100%; } 100% { left: 100%; } }

        .card-img-box img { max-width: 95%; max-height: 95%; object-fit: contain; opacity: 0; transition: opacity 0.7s; }
        .img-loaded { opacity: 1 !important; }
        
        .card-label { margin-top: 12px; font-size: 0.75rem; font-weight: bold; color: #eceff1; }

        .btn-load-more { background: #2c3636; color: var(--couleur-accent); border: 1px solid var(--couleur-accent); padding: 12px 30px; border-radius: 25px; margin: 30px 0; cursor: pointer; font-weight: bold; }

        /* Modale */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-card { background: #1a1a1a; width: 100%; max-width: 500px; padding: 25px; border-radius: 20px; max-height: 90vh; overflow-y: auto; }
        .detail-img img { width: 100%; border-radius: 12px; }
        .detail-txt { color: #ccc; line-height: 1.8; font-size: 1.05rem; margin-top: 20px; white-space: pre-wrap; }
        .btn-fermer { background: var(--couleur-accent); color: white; border: none; padding: 15px; border-radius: 8px; margin-top: 25px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="asrar-layout">
        <aside class="asrar-sidebar">
            <button onclick="window.location.href='index.html'" style="background:none; border:none; color:#4fd1c5; font-size:1.8rem; cursor:pointer; margin-bottom:25px;">⬅</button>
            <nav id="nav-categories">
                <button onclick="changerCategorie('db_sirr_protection', this)" class="btn-nav active">Protections</button>
                <button onclick="changerCategorie('db_sirr_ouverture', this)" class="btn-nav">Ouvertures</button>
                <button onclick="changerCategorie('db_sirr_deblocage', this)" class="btn-nav">Déblocages</button>
                <button onclick="changerCategorie('db_sirr_ilham', this)" class="btn-nav">Ilham</button>
                <button onclick="changerCategorie('db_sirr_domptage', this)" class="btn-nav">Domptages</button>
            </nav>
        </aside>

        <main class="asrar-main">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Rechercher un secret..." onkeyup="filtrerListe()">
            </div>
            <div id="container-liste" class="vertical-feed"></div>
            <button id="loadMoreBtn" class="btn-load-more" onclick="chargerData()" style="display:none;">CHARGER PLUS</button>
        </main>
    </div>

    <div id="ma-modale" class="modal-overlay" onclick="fermerModale()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div id="modal-img" class="detail-img"></div>
            <h2 id="modal-title" style="margin-top:0; color:var(--couleur-accent);"></h2>
            <div id="modal-sirr" class="detail-txt"></div>
            <button class="btn-fermer" onclick="fermerModale()">RETOUR AU CATALOGUE</button>
        </div>
    </div>

    <script>
        const IMG_DE_SECOURS = "https://i.supaimg.com/2a53ec6e-056d-4b1b-9b10-28f105901a55/465d1949-acb8-4008-b88c-f6a53388fe0a.jpg";
        const firebaseConfig = {
            apiKey: "AIzaSyBLzPKzbiNYitUz7sv9Ftqm0oF20rA32Zk",
            authDomain: "asrar-bc059.firebaseapp.com",
            databaseURL: "https://asrar-bc059.firebaseio.com",
            projectId: "asrar-bc059",
            storageBucket: "asrar-bc059.appspot.com",
            appId: "1:199810893447:android:044629472e10f9eb68da22"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let cheminActuel = 'db_sirr_protection';
        let dernierKey = null;
        let secretsAffiches = [];
        const TAILLE_PAGE = 10;

        function changerCategorie(chemin, bouton) {
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
            if(bouton) bouton.classList.add('active');
            cheminActuel = chemin;
            dernierKey = null;
            secretsAffiches = [];
            document.getElementById('container-liste').innerHTML = '';
            document.getElementById('searchInput').value = '';
            chargerData();
        }

        function chargerData() {
            let query = db.ref(cheminActuel).orderByKey().limitToFirst(TAILLE_PAGE);
            if (dernierKey) {
                query = db.ref(cheminActuel).orderByKey().startAfter(dernierKey).limitToFirst(TAILLE_PAGE);
            }

            query.once('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    const keys = Object.keys(data);
                    dernierKey = keys[keys.length - 1];
                    const nouveauxSecrets = Object.values(data);
                    secretsAffiches = [...secretsAffiches, ...nouveauxSecrets];
                    afficherSecrets(nouveauxSecrets, false);
                    document.getElementById('loadMoreBtn').style.display = (keys.length === TAILLE_PAGE) ? 'block' : 'none';
                } else {
                    document.getElementById('loadMoreBtn').style.display = 'none';
                }
            });
        }

        function afficherSecrets(liste, reset) {
            const feed = document.getElementById('container-liste');
            if(reset) feed.innerHTML = '';

            liste.forEach(item => {
                const card = document.createElement('div');
                card.className = 'secret-card';
                const imageSrc = item.img && item.img !== "" ? item.img : IMG_DE_SECOURS;

                card.innerHTML = `
                    <div class="card-img-box loading-shimmer">
                        <img src="${imageSrc}" onload="handleImgLoad(this)" onerror="this.src='${IMG_DE_SECOURS}'; handleImgLoad(this);">
                    </div>
                    <div class="card-label">${(item.faida || '').toUpperCase()}</div>
                `;
                card.onclick = () => ouvrirModale(item);
                feed.appendChild(card);
            });
        }

        function handleImgLoad(img) {
            img.classList.add('img-loaded');
            img.parentElement.classList.remove('loading-shimmer');
        }

        function filtrerListe() {
            const terme = document.getElementById('searchInput').value.toLowerCase();
            if(terme === "") {
                afficherSecrets(secretsAffiches, true);
                document.getElementById('loadMoreBtn').style.display = (secretsAffiches.length >= TAILLE_PAGE) ? 'block' : 'none';
            } else {
                const filtres = secretsAffiches.filter(s => s.faida && s.faida.toLowerCase().includes(terme));
                afficherSecrets(filtres, true);
                document.getElementById('loadMoreBtn').style.display = 'none';
            }
        }

        function ouvrirModale(item) {
            document.getElementById('modal-title').innerText = item.faida || '';
            document.getElementById('modal-sirr').innerText = item.sirr || '';
            const imageSrc = item.img && item.img !== "" ? item.img : IMG_DE_SECOURS;
            document.getElementById('modal-img').innerHTML = `<img src="${imageSrc}">`;
            document.getElementById('ma-modale').style.display = 'flex';
        }

        function fermerModale() { document.getElementById('ma-modale').style.display = 'none'; }

        window.onload = () => chargerData();
    </script>
</body>
</html>
