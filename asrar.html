<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ASRAR PRO - Final Fix</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #0c0f0f; --sidebar: #1d2525; --text: #ffffff;
            --accent: #2196f3; --card: #1a1a1a; --gold: #ffd700;
            --fire: linear-gradient(90deg, #ff8a00, #e52e71);
            --input-bg: #0c0f0f;
        }

        body.light-mode {
            --bg: #f0f2f5; --sidebar: #ffffff; --text: #1a1a1a;
            --accent: #2196f3; --card: #ffffff; --input-bg: #f0f2f5;
        }

        body { background-color: var(--bg); color: var(--text); margin: 0; font-family: 'Segoe UI', sans-serif; transition: 0.3s; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .asrar-layout { display: flex; height: 100vh; padding-top: env(safe-area-inset-top); }

        /* SIDEBAR */
        .asrar-sidebar { width: 85px; background: var(--sidebar); display: flex; flex-direction: column; align-items: center; padding-top: 20px; border-right: 1px solid rgba(0,0,0,0.1); }
        .theme-toggle { font-size: 1.4rem; cursor: pointer; margin-bottom: 25px; }
        .btn-nav { width: 70px; padding: 12px 2px; margin-bottom: 10px; background: rgba(0,0,0,0.05); border: none; color: #90a4ae; border-radius: 10px; font-size: 0.55rem; cursor: pointer; }
        .btn-nav.active { border-left: 4px solid var(--accent); background: var(--accent); color: white; }

        /* MAIN & FEED */
        .asrar-main { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .podium-section { width: 100%; max-width: 380px; margin-bottom: 25px; padding: 15px; background: rgba(33, 150, 243, 0.05); border-radius: 20px; border: 1px solid rgba(33, 150, 243, 0.1); }
        .podium-grid { display: flex; justify-content: space-around; align-items: flex-end; }
        .podium-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; width: 30%; }
        .podium-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #ccc; }
        .rank-1 .podium-img { width: 90px; height: 90px; border-color: var(--gold); }

        .vertical-feed { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 380px; padding-bottom: 80px; }
        .secret-card { background: var(--card); border-radius: 15px; padding: 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .card-thumb { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; }

        /* POWER BAR */
        .p-bar-bg { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 5px; overflow: hidden; }
        .p-bar-fill { height: 100%; background: var(--fire); transition: width 0.8s ease; }

        /* MODALE CHAT */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; flex-direction: column; }
        .modal-header { background: var(--sidebar); padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .modal-body { flex: 1; overflow-y: auto; padding: 15px; }
        .chat-input-box { background: var(--sidebar); padding: 12px; display: flex; gap: 10px; }
        #chatInput { flex: 1; background: var(--input-bg); border: 1px solid rgba(128,128,128,0.3); color: var(--text); padding: 12px; border-radius: 25px; outline: none; }
        
        .bubble { background: rgba(33,150,243,0.1); padding: 10px; border-radius: 10px; margin-bottom: 8px; font-size: 0.85rem; }
        .bubble b { color: var(--accent); display: block; font-size: 0.7rem; }

        /* SETUP PROFIL */
        #profile-setup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="profile-setup">
        <div style="background: white; padding: 25px; border-radius: 20px; width: 280px; text-align: center; color: #333;">
            <h3>ASRAR PRO</h3>
            <input type="text" id="p_pseudo" placeholder="Votre Pseudo..." style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd;">
            <button onclick="saveUser()" style="width:100%; padding:12px; background:#2196f3; color:white; border:none; border-radius:8px;">COMMENCER</button>
        </div>
    </div>

    <div class="asrar-layout">
        <aside class="asrar-sidebar">
            <div class="theme-toggle" onclick="toggleMode()">🌙</div>
            <button onclick="window.location.href='index.html'" style="background:none; border:none; color:var(--accent); font-size:1.5rem; margin-bottom:20px;">⬅</button>
            <nav>
                <button onclick="changeCat('db_sirr_protection', this)" class="btn-nav active">Protections</button>
                <button onclick="changeCat('db_sirr_ouverture', this)" class="btn-nav">Ouvertures</button>
                <button onclick="changeCat('db_sirr_deblocage', this)" class="btn-nav">Déblocages</button>
            </nav>
        </aside>

        <main class="asrar-main">
            <div class="podium-section">
                <div id="podium-box" class="podium-grid"></div>
            </div>
            <div id="feed-box" class="vertical-feed"></div>
        </main>
    </div>

    <div id="modal-view" class="modal-overlay">
        <div class="modal-header">
            <button onclick="closeModal()" style="background:none; border:none; color:var(--text); font-size:1.6rem;">✕</button>
            <div id="m-faida" style="font-weight:bold; font-size:0.8rem;"></div>
            <div onclick="addLike()" style="cursor:pointer; font-size:1.5rem;">❤️</div>
        </div>
        <div class="modal-body" id="m-scroll">
            <div id="m-img" style="margin-bottom:15px;"></div>
            <div id="m-sirr" style="line-height:1.6; font-size:0.95rem; margin-bottom:25px; border-bottom:1px solid rgba(128,128,128,0.2); padding-bottom:15px;"></div>
            <div id="m-chat-list"></div>
        </div>
        <div class="chat-input-box">
            <input type="text" id="chatInput" placeholder="Votre message...">
            <button onclick="pushMsg()" style="background:none; border:none; color:var(--accent); font-weight:bold;">ENVOYER</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBLzPKzbiNYitUz7sv9Ftqm0oF20rA32Zk",
            databaseURL: "https://asrar-bc059.firebaseio.com",
            projectId: "asrar-bc059"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let user = JSON.parse(localStorage.getItem('asrar_user'));
        let currentCat = 'db_sirr_protection';
        let currentID = null;

        function toggleMode() {
            document.body.classList.toggle('light-mode');
            document.querySelector('.theme-toggle').innerText = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
        }

        function saveUser() {
            const p = document.getElementById('p_pseudo').value;
            if(!p) return;
            user = { name: p };
            localStorage.setItem('asrar_user', JSON.stringify(user));
            document.getElementById('profile-setup').style.display = 'none';
        }

        function changeCat(cat, btn) {
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCat = cat;
            loadSecrets();
        }

        function loadSecrets() {
            db.ref(currentCat).on('value', (snap) => {
                const data = snap.val();
                if(!data) return;
                const items = Object.keys(data).map(k => ({...data[k], key: k}));
                items.sort((a,b) => (b.likes || 0) - (a.likes || 0));
                
                // Podium (3 premiers)
                const podium = document.getElementById('podium-box');
                podium.innerHTML = '';
                [items[1], items[0], items[2]].forEach((it, i) => {
                    if(!it) return;
                    const d = document.createElement('div');
                    d.className = `podium-item ${i==1?'rank-1':''}`;
                    d.innerHTML = `<img src="${it.img}" class="podium-img">
                                   <div style="font-size:0.6rem; margin-top:5px;">${it.likes||0} ❤️</div>`;
                    d.onclick = () => openModal(it);
                    podium.appendChild(d);
                });

                // Liste (le reste)
                const feed = document.getElementById('feed-box');
                feed.innerHTML = '';
                items.slice(3).forEach(it => {
                    const card = document.createElement('div');
                    card.className = 'secret-card';
                    const power = Math.min((it.likes||0), 100) + '%';
                    card.innerHTML = `
                        <img src="${it.img}" class="card-thumb">
                        <div style="flex:1">
                            <h4 style="margin:0; font-size:0.8rem;">${it.faida}</h4>
                            <div class="p-bar-bg"><div class="p-bar-fill" style="width:${power}"></div></div>
                        </div>
                    `;
                    card.onclick = () => openModal(it);
                    feed.appendChild(card);
                });
            });
        }

        function openModal(it) {
            currentID = it.key;
            document.getElementById('m-faida').innerText = it.faida.toUpperCase();
            document.getElementById('m-sirr').innerText = it.sirr;
            document.getElementById('m-img').innerHTML = `<img src="${it.img}" style="width:100%; border-radius:15px;">`;
            document.getElementById('modal-view').style.display = 'flex';
            
            // Gestion Historique pour bouton retour Android
            window.history.pushState({modal: true}, "");

            // Charger Chat
            db.ref('discussions/' + currentID).on('value', (snap) => {
                const list = document.getElementById('m-chat-list');
                list.innerHTML = '';
                const msgs = snap.val();
                if(msgs) {
                    Object.values(msgs).forEach(m => {
                        const d = document.createElement('div');
                        d.className = 'bubble';
                        d.innerHTML = `<b>${m.user}</b> ${m.text}`;
                        list.appendChild(d);
                    });
                    document.getElementById('m-scroll').scrollTop = 99999;
                }
            });
        }

        function addLike() {
            if(!currentID) return;
            db.ref(`${currentCat}/${currentID}/likes`).transaction(c => (c || 0) + 1);
        }

        function pushMsg() {
            const inp = document.getElementById('chatInput');
            if(!inp.value || !currentID) return;
            db.ref('discussions/' + currentID).push({
                user: user.name,
                text: inp.value,
                time: Date.now()
            }).then(() => { inp.value = ''; });
        }

        function closeModal() {
            db.ref('discussions/' + currentID).off();
            document.getElementById('modal-view').style.display = 'none';
            currentID = null;
        }

        // Intercepter le bouton retour du téléphone
        window.onpopstate = function() {
            document.getElementById('modal-view').style.display = 'none';
        };

        window.onload = () => {
            if(!user) document.getElementById('profile-setup').style.display = 'flex';
            loadSecrets();
        };
    </script>
</body>
</html>
