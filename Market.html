<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ASRAR PRO - Marché & Services</title>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8198863698846619" crossorigin="anonymous"></script>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #0f172a; 
            --cuir: #3a1c0b; 
            --or: #d9a06f; 
            --texte: #f1e4c3;
            --bordure: 1px solid #5d3a1a;
        }

        body {
            background-color: var(--bg);
            color: var(--texte);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 2px solid #5d3a1a;
            padding-bottom: 10px;
        }

        .back-btn {
            background: var(--cuir);
            border: var(--bordure);
            color: var(--or);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .section-title {
            font-size: 1.1rem;
            color: var(--or);
            margin: 20px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- LISTE HORIZONTALE PREMIUM --- */
        .sellers-container {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 10px 5px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
        }

        .sellers-container::-webkit-scrollbar { display: none; }

        .seller-card {
            flex: 0 0 150px;
            scroll-snap-align: start;
            background: var(--cuir);
            border: var(--bordure);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Effet Glide */
        @keyframes glide {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .img-wrapper {
            width: 100%;
            height: 110px;
            background: #1a1a1a;
            position: relative;
            overflow: hidden;
        }

        .img-wrapper.loading {
            background: linear-gradient(90deg, #2a1508 25%, #4a2b1a 50%, #2a1508 75%);
            background-size: 200% 100%;
            animation: glide 1.5s infinite linear;
        }

        .seller-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .seller-img.loaded { opacity: 1; }

        /* Badge de confiance */
        .follow-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--or);
            color: #000;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 10px;
            z-index: 5;
        }

        .seller-info {
            padding: 8px;
            text-align: center;
        }

        .seller-name {
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--or);
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-contact {
            background: transparent;
            border: 1px solid var(--or);
            color: var(--or);
            font-size: 0.65rem;
            padding: 5px;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-contact:active {
            background: var(--or);
            color: #000;
        }

        /* Annonce Bannière */
        .ad-container {
            margin: 20px 0;
            background: rgba(255,255,255,0.05);
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #444;
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">📜</button>
        <h1 style="margin:0; font-size:1rem;">ASRAR PRO MARKET</h1>
    </div>

    <h2 class="section-title">Vendeurs Premium</h2>
    
    <div class="sellers-container" id="seller-list">
        </div>

    <div class="ad-container">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-8198863698846619"
             data-ad-slot="votre-slot-id"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script>
        // Config Firebase
        const config = { databaseURL: "https://asrar-bc059.firebaseio.com" };
        firebase.initializeApp(config);
        const db = firebase.database();

        function loadSellers() {
            // Récupération de profile_clients
            db.ref('profile_clients').on('value', snap => {
                const data = snap.val();
                if(!data) return;

                const sellers = Object.keys(data).map(k => ({...data[k], key: k}));
                
                document.getElementById('seller-list').innerHTML = sellers.map(s => `
                    <div class="seller-card">
                        <div class="follow-badge">👍 ${s.follow || 0}</div>
                        <div class="img-wrapper loading" id="wrap-${s.key}">
                            <img src="${s.img}" class="seller-img" 
                                 onload="showImg(this, '${s.key}')"
                                 onerror="this.src='https://via.placeholder.com/150x110?text=Service'">
                        </div>
                        <div class="seller-info">
                            <div class="seller-name">${s.profile_name || 'Anonyme'}</div>
                            <button class="btn-contact" onclick="contactSeller('${s.number}')">
                                WhatsApp
                            </button>
                        </div>
                    </div>
                `).join('');
            });
        }

        function showImg(img, key) {
            const wrap = document.getElementById('wrap-' + key);
            if(wrap) wrap.classList.remove('loading');
            img.classList.add('loaded');
        }

        function contactSeller(num) {
            if(!num) return alert("Numéro non disponible.");
            // Nettoyage du numéro pour WhatsApp
            const cleanNum = num.replace(/\s/g, '').replace('+', '');
            window.location.href = `https://wa.me/${cleanNum}?text=Bonjour, je vous contacte via ASRAR PRO`;
        }

        window.onload = loadSellers;
    </script>
</body>
</html>
