<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marché - ASRAR PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0a0e17; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .row { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 10px; }
        .scard { flex: 0 0 160px; background: #161b2a; border-radius: 12px; border: 1px solid #d9a06f; overflow: hidden; position: relative; }
        .simg { width: 100%; height: 110px; background: #000; }
        .simg img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 5px; right: 5px; background: #d9a06f; color: #000; font-size: 0.6rem; padding: 2px 5px; border-radius: 5px; }
        .btn-wa { width: 100%; background: transparent; border: 1px solid #d9a06f; color: #d9a06f; padding: 6px; font-size: 0.7rem; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <button onclick="location.href='index.html'" style="background:none; border:1px solid #d9a06f; color:#d9a06f; border-radius:20px; padding:5px 15px; margin-bottom:20px;">← Accueil</button>
    <h2 style="color:#d9a06f; font-size:1rem;">SERVICES PREMIUM</h2>
    <div class="row" id="slist"></div>
    <script>
        firebase.initializeApp({ databaseURL: "https://asrar-bc059.firebaseio.com" });
        firebase.database().ref('profile_clients').on('value', s => {
            const d = s.val();
            document.getElementById('slist').innerHTML = Object.keys(d).map(k => `
                <div class="scard">
                    <div class="badge">👍 ${d[k].follow || 0}</div>
                    <div class="simg"><img src="${d[k].img}"></div>
                    <div style="padding:10px; text-align:center;">
                        <div style="font-size:0.8rem; font-weight:bold; margin-bottom:8px;">${d[k].profile_name}</div>
                        <button class="btn-wa" onclick="location.href='https://wa.me/${d[k].number}'">CONTACTER</button>
                    </div>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
