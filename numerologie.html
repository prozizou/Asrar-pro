<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numérologie Dynamique - ASRAR PRO</title>
    <style>
        :root { 
            --bg: #0a0e17; --card: #161b2a; --accent: #00bcd4; --text: #ffffff; 
            --border: #232d42; --muted: #8899a6; --pink: #e91e63;
        }
        
        body { 
            background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .header { width: 100%; max-width: 500px; margin-bottom: 20px; }
        .back-btn { 
            background: rgba(0, 188, 212, 0.1); border: 1px solid var(--accent); 
            color: var(--accent); padding: 8px 18px; border-radius: 20px; 
            cursor: pointer; text-decoration: none; font-size: 0.75rem; font-weight: bold;
        }

        .container { width: 100%; max-width: 500px; }

        .input-box { 
            background: var(--card); padding: 30px; border-radius: 20px; 
            border: 1px solid var(--border); text-align: center; margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        label { display: block; font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px; }
        input { 
            width: 90%; background: transparent; border: none; border-bottom: 2px solid var(--accent); 
            color: white; font-size: 2.8rem; text-align: center; outline: none; font-weight: 900;
        }

        .res-list { display: flex; flex-direction: column; gap: 12px; }
        .res-item { 
            background: var(--card); padding: 18px; border-radius: 12px; 
            border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
        }
        .res-label { font-size: 0.8rem; color: var(--muted); font-weight: 600; text-transform: uppercase; }
        .res-val { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.5px; }

        .meditation-box { text-align: right; }
        .meditation-val { color: var(--pink); display: block; }
        .link-inter { font-size: 0.6rem; color: var(--pink); text-decoration: none; font-weight: bold; opacity: 0.8; }
        .zodiaque-val { color: #9c27b0; transition: 0.3s; }
        
        .nature-badge { padding: 5px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: 900; transition: 0.5s; }
        .eau { background: rgba(66, 153, 225, 0.15); color: #4299e1; border: 1px solid #4299e1; }
        .feu { background: rgba(245, 101, 101, 0.15); color: #f56565; border: 1px solid #f56565; }
        .terre { background: rgba(237, 137, 54, 0.15); color: #ed8936; border: 1px solid #ed8936; }
        .air { background: rgba(160, 174, 192, 0.15); color: #cbd5e0; border: 1px solid #cbd5e0; }

        .math-section { margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">← HUB ASRAR PRO</a>
    </div>

    <div class="container">
        <div class="input-box">
            <label>Valeur d'Entrée (X)</label>
            <input type="number" id="X" value="644" oninput="calculerTout()">
        </div>

        <div class="res-list">
            <div class="res-item">
                <span class="res-label">Face Apparente</span>
                <span class="res-val" id="apparent">0</span>
            </div>
            <div class="res-item">
                <span class="res-label">Face Cachée</span>
                <span class="res-val" id="cachee">0</span>
            </div>

            <div class="res-item">
                <span class="res-label">Chiffre Méditation</span>
                <div class="meditation-box">
                    <span class="res-val meditation-val" id="meditation">0</span>
                    <a href="interpretation.html" class="link-inter">SIGNIFICATION →</a>
                </div>
            </div>

            <div class="res-item">
                <span class="res-label">Ordre Zodiaque</span>
                <span class="res-val zodiaque-val" id="zodiaque">-</span>
            </div>

            <div class="res-item">
                <span class="res-label">Nature</span>
                <div id="nature-box"></div>
            </div>

            <div class="res-item math-section">
                <span class="res-label">Chiffre Rouwhanique</span>
                <span class="res-val" id="rouwhanique">0</span>
            </div>
            <div class="res-item">
                <span class="res-label">Chiffre Lumineux</span>
                <span class="res-val" id="lumineux">0</span>
            </div>
        </div>
    </div>

    <script>
        const zodiaqueLabels = {
            1: "Bélier", 2: "Taureau", 3: "Gémeaux", 4: "Cancer",
            5: "Lion", 6: "Vierge", 7: "Balance", 8: "Scorpion",
            9: "Sagittaire", 10: "Capricorne", 11: "Verseau", 0: "Poissons"
        };

        // Fonction d'animation de compteur
        function animateValue(id, start, end, duration) {
            if (start === end) return;
            const obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const current = Math.floor(progress * (end - start) + start);
                obj.innerHTML = current.toLocaleString();
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        // Stocker les anciennes valeurs pour l'effet de transition
        let lastValues = { apparent: 0, cachee: 0, meditation: 0, rouwhanique: 0, lumineux: 0 };

        function calculerTout() {
            const x = parseInt(document.getElementById('X').value);
            if (isNaN(x)) return;

            // 1 & 2. Faces
            const inverseVal = parseInt(x.toString().split('').reverse().join(''));
            
            animateValue("apparent", lastValues.apparent, x, 400);
            animateValue("cachee", lastValues.cachee, inverseVal, 400);

            // 3. Méditation
            const meditation = (x + inverseVal) * 9;
            animateValue("meditation", lastValues.meditation, meditation, 500);

            // 4. Zodiaque
            const resteZod = x % 12;
            document.getElementById('zodiaque').innerText = `${resteZod} — ${zodiaqueLabels[resteZod]}`;

            // 5. Nature
            const resteNat = x % 4;
            const nBox = document.getElementById('nature-box');
            let label = "", style = "";
            if(resteNat === 0) { label = "EAU"; style = "eau"; }
            else if(resteNat === 1) { label = "FEU"; style = "feu"; }
            else if(resteNat === 2) { label = "TERRE"; style = "terre"; }
            else if(resteNat === 3) { label = "AIR"; style = "air"; }
            nBox.innerHTML = `<span class="nature-badge ${style}">${label} (${resteNat})</span>`;

            // 6 & 7. Math
            const rouw = x * x;
            const lumi = (x * (x + 1)) / 2;
            animateValue("rouwhanique", lastValues.rouwhanique, rouw, 600);
            animateValue("lumineux", lastValues.lumineux, lumi, 600);

            // Mise à jour des anciennes valeurs
            lastValues = { apparent: x, cachee: inverseVal, meditation: meditation, rouwhanique: rouw, lumineux: lumi };
        }

        window.onload = calculerTout;
    </script>
</body>
</html>
