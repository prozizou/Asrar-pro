<!DOCTYPE html>
<body style="background:#0a0e17; color:white; text-align:center; padding:50px;">
    <h1>TEST MISE À JOUR</h1>
    <input type="number" id="X" value="308" oninput="test()">
    <div id="resultat" style="color:#00bcd4; font-size:2rem; margin-top:20px;">---</div>
    <div id="astral" style="color:#9c27b0; font-size:1.5rem; margin-top:20px;">---</div>

    <script>
        function test() {
            let x = document.getElementById('X').value;
            document.getElementById('resultat').innerText = "Nombre: " + x;
            // CECI DOIT S'AFFICHER EN VIOLET
            document.getElementById('astral').innerText = "Détails Astraux Activés !";
        }
        window.onload = test;
    </script>
</body>
