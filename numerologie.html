<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numérologie & Compatibilité - ASRAR PRO</title>
    <style>
        :root { 
            --bg: #0a0e17; --card: #161b2a; --accent: #00bcd4; --text: #ffffff; 
            --border: #232d42; --muted: #8899a6; --pink: #e91e63; --purple: #9c27b0;
        }
        
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; }
        .header { width: 100%; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .back-btn { background: rgba(0, 188, 212, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 8px 15px; border-radius: 20px; text-decoration: none; font-size: 0.7rem; font-weight: bold; }

        /* Sections de Saisie */
        .section-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        label { display: block; font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; text-align: center; }
        input { width: 100%; background: transparent; border: none; border-bottom: 2px solid var(--accent); color: white; font-size: 2rem; text-align: center; outline: none; font-weight: 800; margin-bottom: 10px; }

        /* Résultats */
        .res-item { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .res-label { font-size: 0.75rem; color: var(--muted); font-weight: 600; }
        .res-val { font-size: 1rem; font-weight: 700; }
        
        .astral-detail { font-size: 0.65rem; color: var(--purple); margin-top: 4px; display: block; text-align: right; }

        /* Badges Natures */
        .nature-badge { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 900; }
        .eau { color: #4299e1; border: 1px solid #4299e1; }
        .feu { color: #f56565; border: 1px solid #f56565; }
        .terre { color: #ed8936; border: 1px solid #ed8936; }
        .air { color: #cbd5e0; border: 1px solid #cbd5e0; }

        /* Zone Compatibilité */
        .comp-title { color: var(--accent); font-size: 0.9rem; font-weight: bold; text-align: center; margin: 20px 0 10px; text-transform: uppercase; }
        #comp-result { padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; font-size: 0.9rem; margin-top: 10px; border: 1px dashed var(--border); }
        .comp-success { color: #48bb78; background: rgba(72, 187, 120, 0.1); border-color: #48bb78 !important; }
        .comp-danger { color: #f56565; background: rgba(245, 101, 101, 0.1); border-color: #f56565 !important; }
        .comp-neutral { color: #ecc94b; background: rgba(236, 201, 75, 0.1); border-color: #ecc94b !important; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">← HUB</a>
        <a href="interpretation.html" class="back-btn" style="border-color:var(--pink); color:var(--pink);">GUIDE MÉDITATION</a>
    </div>

    <div class="container">
        <div class="section-card">
            <label>Votre Nombre Principal (X)</label>
            <input type="number" id="X" value="644" oninput="runCalculs()">
            
            <div id="main-results">
                <div class="res-item">
                    <span class="res-label">Zodiaque & Planète</span>
                    <div style="text-align: right;">
                        <span class="res-val" id="zod-name" style="color:var(--purple);">-</span>
                        <span class="astral-detail" id="zod-meta">-</span>
                    </div>
                </div>
                <div class="res-item">
                    <span class="res-label">Nature</span>
                    <div id="nat-box"></div>
                </div>
                <div class="res-item">
                    <span class="res-label">Chiffre Méditation</span>
                    <span class="res-val" id="med-val" style="color:var(--pink);">-</span>
                </div>
            </div>
        </div>

        <div class="comp-title">Test de Compatibilité Élémentaire</div>
        <div class="section-card">
            <div style="display: flex; gap: 10px;">
                <div style="flex:1;">
                    <label>Votre X</label>
                    <input type="number" id="val1" value="644" oninput="checkCompat()">
                </div>
                <div style="flex:1;">
                    <label>Nombre Projet/Ami</label>
                    <input type="number" id="val2" placeholder="Ex: 812" oninput="checkCompat()">
                </div>
            </div>
            <div id="comp-result">Entrez un deuxième nombre...</div>
        </div>
    </div>

    <script>
        const zodiacData = {
            1: { n: "Bélier", p: "Mars", d: "Est", h: "06h-08h" },
            2: { n: "Taureau", p: "Vénus", d: "S-Est", h: "08h-10h" },
            3: { n: "Gémeaux", p: "Mercure", d: "N-Est", h: "10h-12h" },
            4: { n: "Cancer", p: "Lune", d: "Nord", h: "12h-14h" },
            5: { n: "Lion", p: "Soleil", d: "N-Ouest", h: "14h-16h" },
            6: { n: "Vierge", p: "Mercure", d: "S-Ouest", h: "16h-18h" },
            7: { n: "Balance", p: "Vénus", d: "Ouest", h: "18h-20h" },
            8: { n: "Scorpion", p: "Mars", d: "Sud", h: "20h-22h" },
            9: { n: "Sagittaire", p: "Jupiter", d: "Est", h: "22h-00h" },
            10: { n: "Capricorne", p: "Saturne", d: "Sud", h: "00h-02h" },
            11: { n: "Verseau", p: "Saturne", d: "Ouest", h: "02h-04h" },
            0: { n: "Poissons", p: "Jupiter", d: "Nord", h: "04h-06h" }
        };

        const natures = ["EAU", "FEU", "TERRE", "AIR"];
        const natureClasses = ["eau", "feu", "terre", "air"];

        function runCalculs() {
            const x = parseInt(document.getElementById('X').value);
            if (isNaN(x)) return;

            // Zodiaque
            const rZ = x % 12;
            const z = zodiacData[rZ];
            document.getElementById('zod-name').innerText = `${rZ} — ${z.n}`;
            document.getElementById('zod-meta').innerText = `${z.p} | Dir: ${z.d} | Force: ${z.h}`;

            // Nature
            const rN = x % 4;
            document.getElementById('nat-box').innerHTML = `<span class="nature-badge ${natureClasses[rN]}">${natures[rN]}</span>`;

            // Méditation
            const inv = parseInt(x.toString().split('').reverse().join(''));
            document.getElementById('med-val').innerText = ((x + inv) * 9).toLocaleString();
        }

        function checkCompat() {
            const n1 = parseInt(document.getElementById('val1').value);
            const n2 = parseInt(document.getElementById('val2').value);
            const box = document.getElementById('comp-result');

            if (isNaN(n1) || isNaN(n2)) return;

            const r1 = n1 % 4; // Nature 1
            const r2 = n2 % 4; // Nature 2
            
            const nat1 = natures[r1];
            const nat2 = natures[r2];

            let msg = `${nat1} + ${nat2} : `;
            let status = "";

            // LOGIQUE DE COMPATIBILITÉ
            if (r1 === r2) {
                msg += "Excellente Harmonie (Même Nature)";
                status = "comp-success";
            } else if ((r1 === 1 && r2 === 3) || (r1 === 3 && r2 === 1)) {
                msg += "Très Bon (Le Feu se nourrit de l'Air)";
                status = "comp-success";
            } else if ((r1 === 0 && r2 === 2) || (r1 === 2 && r2 === 0)) {
                msg += "Fructueux (L'Eau nourrit la Terre)";
                status = "comp-success";
            } else if ((r1 === 1 && r2 === 0) || (r1 === 0 && r2 === 1)) {
                msg += "Opposés (L'Eau éteint le Feu)";
                status = "comp-danger";
            } else if ((r1 === 2 && r2 === 3) || (r1 === 3 && r2 === 2)) {
                msg += "Difficile (La Terre étouffe l'Air)";
                status = "comp-danger";
            } else {
                msg += "Relation Neutre";
                status = "comp-neutral";
            }

            box.innerText = msg;
            box.className = status;
        }

        window.onload = () => { runCalculs(); checkCompat(); };
    </script>
</body>
</html>
