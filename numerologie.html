<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numérologie - ASRAR PRO</title>
    <style>
        :root { --bg: #0a0e17; --card-bg: #1e2530; --accent: #00bcd4; --text: #ffffff; --border: #303742; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { width: 100%; max-width: 500px; display: flex; align-items: center; margin-bottom: 25px; }
        .back-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 5px 15px; border-radius: 20px; cursor: pointer; text-decoration: none; font-size: 0.8rem; }
        
        .container { width: 100%; max-width: 500px; }
        
        /* Zone de saisie */
        .input-section { background: var(--card-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); text-align: center; }
        label { display: block; font-size: 0.7rem; color: #8899a6; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        input { width: 80%; background: transparent; border: none; border-bottom: 2px solid var(--accent); color: white; font-size: 2rem; text-align: center; outline: none; }

        /* Tableau de calculs */
        .result-row { 
            background: var(--card-bg); padding: 15px; border-radius: 8px; margin-bottom: 8px; 
            display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border);
        }
        .label { font-size: 0.9rem; font-weight: 600; }
        .value { font-size: 1.1rem; font-weight: 700; color: #f0f0f0; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">← Retour</a>
    </div>

    <div class="container">
        <div class="input-section">
            <label>Nombre à déterminer</label>
            <input type="number" id="inputX" value="644" oninput="calculer()">
        </div>

        <div id="results">
            <div class="result-row">
                <span class="label">Face apparent</span>
                <span class="value" id="face-apparent">644</span>
            </div>
            <div class="result-row">
                <span class="label">Face cachée</span>
                <span class="value" id="face-cachee">446</span>
            </div>
            <div class="result-row">
                <span class="label">Chiffre rouwhanique</span>
                <span class="value" id="chiffre-rouwhanique">414 736</span>
            </div>
            <div class="result-row">
                <span class="label">Chiffre lumineux</span>
                <span class="value" id="chiffre-lumineux">207 690</span>
            </div>
        </div>
    </div>

    <script>
        function calculer() {
            const x = parseInt(document.getElementById('inputX').value);
            
            if (isNaN(x)) return;

            // 1. Face apparent = x
            document.getElementById('face-apparent').innerText = x;

            // 2. Face cachée = inverse de x (ex: 644 -> 446)
            const inverse = x.toString().split('').reverse().join('');
            document.getElementById('face-cachee').innerText = inverse;

            // 3. Chiffre rouwhanique = x * x
            const rouwhanique = x * x;
            document.getElementById('chiffre-rouwhanique').innerText = rouwhanique.toLocaleString();

            // 4. Chiffre lumineux = (n*(n+1))/2
            const lumineux = (x * (x + 1)) / 2;
            document.getElementById('chiffre-lumineux').innerText = lumineux.toLocaleString();
        }

        // Lancer le calcul au chargement
        window.onload = calculer;
    </script>
</body>
</html>
